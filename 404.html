<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - RGB Junkie</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
        }
        .logo { max-width: 300px; height: auto; margin-bottom: 20px; }
        .loader {
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #58a6ff; text-decoration: none; font-weight: bold; }
        #redirect-status { display: none; } /* Hidden by default */
    </style>
</head>
<body>

    <img src="https://rgbjunkie.com/rgbjunkie.png" alt="RGB Junkie Logo" class="logo">

    <div id="status-container">
        <h1>404 - Page Not Found</h1>
        <p>Sorry, we couldn't find what you were looking for.</p>
        <p><a href="https://rgbjunkie.com">Return to Home</a></p>
    </div>

    <div id="redirect-status">
        <h1>We've moved!</h1>
        <p><span class="loader"></span>Redirecting you to the new <strong>RGB Junkie</strong>...</p>
    </div>

    <script type="text/javascript">
        var currentHost = window.location.hostname;
        var newDomain = "https://rgbjunkie.com";
        
        // LOOP PREVENTION: Only redirect if the user is NOT already on rgbjunkie.com
        if (currentHost.indexOf("github.io") !== -1) {
            
            // Show the redirect UI, hide the static 404 UI
            document.getElementById('status-container').style.display = 'none';
            document.getElementById('redirect-status').style.display = 'block';

            var path = window.location.pathname;
            var hash = window.location.hash;

            var redirects = {
                "/showcase.html": "/showcase/",
                "/gallery.html": "/gallery/",
                "/showcase": "/showcase/",
                "/gallery": "/gallery/"
            };

            var newPath = redirects[path] ? redirects[path] : path.replace(".html", "");
            
            setTimeout(function() {
                window.location.replace(newDomain + newPath + hash);
            }, 2000);
        }
    </script>
</body>
</html>
