<!DOCTYPE html>
<html>

<head>
    <title>Audio Party</title>
    <meta charset="UTF-8">
    <meta description="Movement, color change, and effects driven by audio frequency zones.">
    <meta publisher="José Miranda (Port and improvements)">
    
    <meta property="color_scheme" label="Color Scheme" type="combobox" default="Rainbow" values="Rainbow,Cloud,Sunset,BPM,Heat,Lava,Ocean,Synthwave,Forest,Two-Color">
    <meta property="color1" label="Color 1" type="color" default="#8a0000">
    <meta property="color2" label="Color 2" type="color" default="#00008a">
    <meta property="color_change_speed" label="Color Change Speed" type="number" min="1" max="50" default="25">
    
    <meta property="base_pattern" label="Base Pattern" type="combobox" default="Waves" values="Waves,Radial,Conic,Checkered">
    <meta property="smooth_patterns" label="Smooth Bands" type="boolean" default="true">
    <meta property="divisions" label="Divisions / Frequency" type="number" min="1" max="32" step="1" default="2">
    
    <meta property="speed" label="Motion Speed" type="number" min="1" max="100" default="15">
    <meta property="rotation_speed" label="Rotation Speed" type="number" min="-100" max="100" default="0">
    
    <meta property="motion_audio_band" label="Audio: Motion Reacts To" type="combobox" default="Bass" values="Bass,Mids,Treble,All Frequencies">
    <meta property="color_audio_band" label="Audio: Color Reacts To" type="combobox" default="Mids" values="Bass,Mids,Treble,All Frequencies">
    <meta property="effect_audio_band" label="Audio: Effects React To" type="combobox" default="All Frequencies" values="Bass,Mids,Treble,All Frequencies">
    <meta property="effect_threshold_percent" label="Audio: Effect Sensitivity (%)" type="number" min="0" max="100" step="1" default="5">
    
    <meta property="smooth_effects" label="Effect: Smooth Lines" type="boolean" default="true">
    <meta property="enable_horizontal_bars" label="Effect: Enable Horizontal Bars" type="boolean" default="true">
    <meta property="enable_vertical_bars" label="Effect: Enable Vertical Bars" type="boolean" default="true">
    <meta property="line_width" label="Effect: Line Width" type="number" min="1" max="50" default="2">
    
    <meta property="enable_shockwave" label="Effect: Enable Shockwave" type="boolean" default="false">
    <meta property="shockwave_color" label="Effect: Shockwave Color" type="color" default="#a3a3a3">
    <meta property="shockwave_thickness" label="Effect: Shockwave Thickness" type="number" min="1" max="50" default="20">
    <meta property="enable_blink" label="Effect: Enable Blink/Explosion" type="boolean" default="false">
    
    <meta property="enable_glitch" label="Effect: Enable Glitch" type="boolean" default="true">
    <meta property="glitch_intensity" label="Effect: Glitch Intensity" type="number" min="1" max="100" default="25">
    
    <meta property="enable_noise" label="Effect: Enable Block Noise" type="boolean" default="false">
    <meta property="noise_is_rgb" label="Noise: Color Noise" type="boolean" default="true">
    <meta property="noise_scale" label="Noise: Scale" type="number" min="1" max="100" default="50">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <canvas id="audioparty-canvas" width="320" height="200"></canvas>
</body>

<script>
    // -------------------------------------------------------------------
    // DYNAMIC DEFAULTS & BROWSER COMPATIBILITY
    // -------------------------------------------------------------------
    
    // Parse meta tags to establish safe defaults universally
    const metaTags = document.querySelectorAll('meta[property]');
    metaTags.forEach(meta => {
        const propName = meta.getAttribute('property');
        const propType = meta.getAttribute('type');
        const defaultVal = meta.getAttribute('default');
        
        // Only set if the engine hasn't already injected the variable
        if (propName && typeof window[propName] === 'undefined') {
            let finalValue = defaultVal;
            if (propType === 'number') finalValue = parseFloat(defaultVal);
            else if (propType === 'boolean') finalValue = (defaultVal === 'true' || defaultVal === '1');
            window[propName] = finalValue;
        }
    });

    if (typeof window.engine === 'undefined') {
        window.engine = { audio: { freq: new Array(200).fill(0) } };
        function simulateAudio() {
            const time = Date.now() / 1000;
            const dataArray = new Array(200).fill(0);
            
            // Bass: Strong pulses
            const beat = (Math.sin(time * Math.PI * 4) + 1) / 2;
            const bassVal = Math.pow(beat, 4) * 255;
            dataArray[0] = bassVal; dataArray[1] = bassVal; dataArray[2] = bassVal;
            
            // Treble & Mids
            for (let i = 10; i < 150; i++) {
                const wave = (Math.sin(time * 8 + i * 0.5) + 1) / 2;
                dataArray[i] = wave * 150 + (Math.random() * 50);
            }
            window.engine.audio.freq = dataArray;
            requestAnimationFrame(simulateAudio);
        }
        simulateAudio();
    } else {
        const overlay = document.getElementById('start-overlay');
        if (overlay) overlay.style.display = 'none';
    }

    // -------------------------------------------------------------------
    // SETUP
    // -------------------------------------------------------------------
    const canvas = document.getElementById('audioparty-canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const w = canvas.width, h = canvas.height;
    const imageData = ctx.createImageData(w, h);
    const data = imageData.data;

    let x_shift = 0, color_shift = 0, rotation_angle = 0, progress = 0;
    let effect_progress = 1.0, effect_idx = 0, other_effect_cycler = -1;
    let cos_a = 1, sin_a = 0;
    let rgb_color1, rgb_color2, shockwave_color_rgb;

    // -------------------------------------------------------------------
    // MATH & COLOR UTILITIES
    // -------------------------------------------------------------------
    const seededRandom = s => { s = Math.sin(s) * 43758.5453; return s - Math.floor(s); };
    
    const lerpColor = (c1, c2, t) => [c1[0] + (c2[0] - c1[0]) * t, c1[1] + (c2[1] - c1[1]) * t, c1[2] + (c2[2] - c1[2]) * t];
    const screenBlend = (b, c) => [255 - (255 - b[0]) * (255 - c[0]) / 255, 255 - (255 - b[1]) * (255 - c[1]) / 255, 255 - (255 - b[2]) * (255 - c[2]) / 255];
    const hexToRgb = (hex) => { const n = parseInt(hex.slice(1), 16) || 0; return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };

    function getAudioBandRange(bandName) {
        if (bandName === "Bass") return [0, 15];
        if (bandName === "Mids") return [16, 100];
        if (bandName === "Treble") return [101, 198]; 
        return [0, 198]; 
    }

    // -------------------------------------------------------------------
    // GRADIENTS
    // -------------------------------------------------------------------
    const gradientDefinitions = {
        "Rainbow": ["#8a0000", "#994d00", "#808000", "#006600", "#00008a", "#4b0082", "#8a0000"],
        "Cloud": ["#021126", "#083073", "#124ca6"],
        "Sunset": ["#36004a", "#8a0404", "#9e4003", "#997900"],
        "BPM": ["#8a0000", "#808005", "#0a730a", "#097373"],
        "Heat": ["#2e0000", "#8a0000", "#997300"],
        "Lava": ["#0a0000", "#6b0000", "#b31b00"],
        "Ocean": ["#00002b", "#00236e", "#004d1f"],
        "Synthwave": ["#3b004d", "#590059", "#004d4d", "#8a0045"],
        "Forest": ["#261103", "#083b08", "#126112"]
    };

    const parsedGradients = {};
    for (const [name, colors] of Object.entries(gradientDefinitions)) {
        parsedGradients[name] = colors.map((hex, index) => ({ pos: colors.length > 1 ? index / (colors.length - 1) : 0, c: hexToRgb(hex) }));
    }

    function evaluateGradient(p, stops) {
        p = Math.max(0, Math.min(1, p));
        for (let i = 0; i < stops.length - 1; i++) {
            if (p <= stops[i+1].pos) return lerpColor(stops[i].c, stops[i+1].c, (p - stops[i].pos) / (stops[i+1].pos - stops[i].pos));
        }
        return stops[stops.length - 1].c;
    }

    // -------------------------------------------------------------------
    // CORE PIXEL RENDERER
    // -------------------------------------------------------------------
    function getColor(x, y) {
        const translatedX = x - (w * 0.5), translatedY = y - (h * 0.5);
        let finalX = (translatedX * cos_a - translatedY * sin_a) + (w * 0.5);
        let finalY = (translatedX * sin_a + translatedY * cos_a) + (h * 0.5);

        if (effect_progress < 1 && effect_idx === 7) {
            const glitch_power = (window.glitch_intensity * 0.01) * (1 - effect_progress);
            finalX += (seededRandom(y * 1234.5) - 0.5) * w * 0.6 * glitch_power;
            const chunk = Math.floor(y / 20);
            if (seededRandom(chunk * 333.3) < glitch_power * 1.5) {
                finalX += (seededRandom(chunk * 444.4) - 0.5) * w * 1.5 * glitch_power;
                finalY += (seededRandom(chunk * 555.5) - 0.5) * h * 0.4 * glitch_power;
            }
        }

        let s;
        if (window.base_pattern === "Radial") {
            const phase = (Math.sqrt(translatedX * translatedX + translatedY * translatedY) / (w / 2) - x_shift * 0.1) * 2 * Math.PI * window.divisions;
            s = window.smooth_patterns ? 0.5 * (1 + Math.sin(phase)) : (Math.sin(phase) > 0 ? 1.0 : 0.0);
        } else if (window.base_pattern === "Conic") {
            const phase = ((Math.atan2(translatedY, translatedX) + Math.PI) / (2 * Math.PI) + x_shift * 0.1) * 2 * Math.PI * window.divisions;
            s = window.smooth_patterns ? 0.5 * (1 + Math.sin(phase)) : (Math.sin(phase) > 0 ? 1.0 : 0.0);
        } else if (window.base_pattern === "Checkered") {
            const pSize = Math.max(2, window.divisions * 10);
            const animSize = pSize + Math.sin(x_shift * 0.2) * (pSize / 2);
            s = window.smooth_patterns ? 0.5 * (1 + Math.sin((finalX / animSize) * Math.PI) * Math.sin((finalY / animSize) * Math.PI)) 
                                       : ((Math.floor(finalX / animSize) + Math.floor(finalY / animSize)) % 2 === 0 ? 1.0 : 0.0);
        } else {
            const phase = (finalX * window.divisions * Math.PI) / w + x_shift;
            s = window.smooth_patterns ? 0.5 * (1 + Math.sin(phase)) : (Math.sin(phase) > 0 ? 1.0 : 0.0);
        }

        let waveColor;
        const grad_prog = (0.5 * (1 + Math.sin(finalY / h * 2 + color_shift)));
        
        if (window.color_scheme === "Two-Color") {
            waveColor = evaluateGradient(grad_prog, [{pos:0, c:rgb_color1}, {pos:1, c:rgb_color2}]);
        } else {
            const scheme = parsedGradients[window.color_scheme] ? window.color_scheme : "Rainbow";
            waveColor = evaluateGradient(grad_prog, parsedGradients[scheme]);
        }

        let baseColor = lerpColor([0,0,0], waveColor, s);

        if (s > 0.001 && effect_progress < 1 && effect_idx === 4 && window.noise_is_rgb) {
            const bSize = 1 + Math.floor(window.noise_scale / 40);
            const seed = (Math.floor((finalX + x_shift * w) / bSize) * 16807 + Math.floor((finalY + color_shift * h) / bSize) * 37) & 0x7fffffff;
            const noiseColor = [seededRandom(seed)*255, seededRandom(seed*1.3)*255, seededRandom(seed*1.7)*255];
            baseColor = lerpColor([0,0,0], screenBlend(noiseColor, waveColor), s);
        }

        if (effect_progress < 1) {
            let eColor = [0,0,0], intensity = 0;
            
            if (effect_idx <= 3) {
                const lw = window.line_width !== undefined ? window.line_width : 2;
                const bw = window.smooth_effects ? lw * 4 : lw;
                
                let targetX = 0, targetY = 0, d = 9999;
                
                if (effect_idx === 0) targetX = effect_progress * w;
                else if (effect_idx === 1) targetX = w - (effect_progress * w);
                else if (effect_idx === 2) targetY = effect_progress * h;
                else if (effect_idx === 3) targetY = h - (effect_progress * h);
                
                if (effect_idx <= 1) d = Math.abs(finalX - targetX);
                else d = Math.abs(finalY - targetY);
                
                intensity = window.smooth_effects ? Math.max(0, 1 - (d / bw)) : (d <= bw ? 1 : 0);
                if (intensity > 0) eColor = [255 * intensity, 255 * intensity, 255 * intensity];
                
            } else if (effect_idx === 5) {
                intensity = 1 - effect_progress;
                eColor = [255 * intensity, 255 * intensity, 255 * intensity];
                
            } else if (effect_idx === 6) {
                const thickness = window.shockwave_thickness !== undefined ? window.shockwave_thickness : 20;
                const d = Math.abs(Math.sqrt(translatedX*translatedX + translatedY*translatedY) - (effect_progress * w / 2));
                intensity = window.smooth_effects ? Math.max(0, 1 - (d / thickness)) : (d < thickness ? 1 : 0);
                if (intensity > 0) eColor = [shockwave_color_rgb[0]*intensity, shockwave_color_rgb[1]*intensity, shockwave_color_rgb[2]*intensity];
            }
            
            if (eColor[0] > 0 || eColor[1] > 0 || eColor[2] > 0) baseColor = screenBlend(baseColor, eColor);
        }
        return baseColor;
    }

    // -------------------------------------------------------------------
    // MAIN LOOP
    // -------------------------------------------------------------------
    let lastTime = 0;
    function update(currentTime) {
        let dt = (!currentTime ? 0 : (currentTime - lastTime) / 1000);
        if (dt > 0.25 || dt <= 0 || isNaN(dt)) dt = 1 / 60;
        lastTime = currentTime;

        const audioData = new Int8Array(engine.audio.freq);
        
        rotation_angle += (window.rotation_speed / 100) * 90 * dt;
        progress += 0.1 * window.speed * dt;
        rgb_color1 = hexToRgb(window.color1); 
        rgb_color2 = hexToRgb(window.color2);
        shockwave_color_rgb = hexToRgb(window.shockwave_color);
        cos_a = Math.cos(rotation_angle * Math.PI / 180.0);
        sin_a = Math.sin(rotation_angle * Math.PI / 180.0);

        const motionRange = getAudioBandRange(window.motion_audio_band);
        for (let i = motionRange[0]; i <= motionRange[1]; i++) { 
            if (audioData[i] > audioData[i+1]) { 
                x_shift += (audioData[i] / 128.0) * (window.speed * dt) * ((i % 2 === 0) ? 1 : -1); 
                break; 
            } 
        }

        const colorRange = getAudioBandRange(window.color_audio_band);
        for (let i = colorRange[0]; i <= colorRange[1]; i++) { 
            if (audioData[i] > audioData[i+1]) { 
                color_shift += (audioData[i] / 128.0) * (window.color_change_speed * dt) * ((i % 2 === 0) ? 1 : -1); 
                break; 
            } 
        }

        if (effect_progress >= 1) {
            let maxLevel = 0;
            const effectRange = getAudioBandRange(window.effect_audio_band);
            for (let i = effectRange[0]; i <= effectRange[1]; i++) {
                maxLevel = Math.max(maxLevel, Math.abs(audioData[i]) / 128.0);
            }
            
            if (maxLevel > (window.effect_threshold_percent / 100.0)) {
                const fx = [];
                if (window.enable_horizontal_bars) fx.push(0, 1);
                if (window.enable_vertical_bars) fx.push(2, 3);
                if (window.enable_shockwave) fx.push(6);
                if (window.enable_blink) fx.push(5);
                if (window.enable_glitch) fx.push(7);
                if (window.enable_noise) fx.push(4);
                if (fx.length > 0) {
                    other_effect_cycler = (other_effect_cycler + 1) % fx.length;
                    effect_idx = fx[other_effect_cycler];
                    effect_progress = 0;
                }
            }
        }

        if (effect_progress < 1) effect_progress = Math.min(1.0, effect_progress + (effect_idx === 4 ? 1.5 : 0.5) * dt);

        let idx = 0;
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const rgb = getColor(x, y);
                data[idx++] = rgb[0]; data[idx++] = rgb[1]; data[idx++] = rgb[2]; data[idx++] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
        window.requestAnimationFrame(update);
    }

    window.requestAnimationFrame(update);
</script>
</html>
