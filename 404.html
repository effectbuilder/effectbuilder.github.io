<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - System Disconnect | RGB Junkie</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-green: #a3be8c;
        }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #d8dee9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 1. Main Content Wrapper (The Case) */
        .case-interior {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            gap: 20px; /* Perfect spacing between all items */
        }

        /* 2. Realistic ARGB Fan */
        .fan-module {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fan-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #ff0000;
            border-radius: 50%;
            animation: rgbCycle 6s linear infinite;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 0 15px currentColor;
        }

        .fan-hub {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #444 0%, #111 80%);
            border-radius: 50%;
            z-index: 5;
            border: 1px solid #222;
        }

        .blades-svg {
            width: 85%;
            height: 85%;
            animation: spin 2s linear infinite;
            opacity: 0.9;
        }

        .blade-path {
            animation: rgbCycle 6s linear infinite;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 0.5;
        }

        /* 3. Text and Branding */
        .logo {
            max-width: 280px;
            height: auto;
            display: block;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .status-tag {
            color: var(--accent-green);
            letter-spacing: 4px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .message {
            color: #666;
            font-size: 0.95rem;
            max-width: 350px;
            margin: 0 auto;
        }

        /* 4. The Redirect Terminal */
        #redirect-status {
            display: none;
            background: #111;
            padding: 15px;
            border-radius: 5px;
            border-left: 3px solid var(--accent-green);
            text-align: left;
            font-size: 0.85rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* 5. Buttons */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            animation: rgbCycle 6s linear infinite;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }

        /* Animations */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rgbCycle {
            0%   { color: #ff0000; fill: #ff0000; border-color: #ff0000; filter: drop-shadow(0 0 5px #ff0000); }
            33%  { color: #00ff00; fill: #00ff00; border-color: #00ff00; filter: drop-shadow(0 0 5px #00ff00); }
            66%  { color: #0000ff; fill: #0000ff; border-color: #0000ff; filter: drop-shadow(0 0 5px #0000ff); }
            100% { color: #ff0000; fill: #ff0000; border-color: #ff0000; filter: drop-shadow(0 0 5px #ff0000); }
        }
    </style>
</head>
<body>

    <div class="case-interior">
        
        <div class="fan-module">
            <div class="fan-ring"></div>
            <div class="fan-hub"></div>
            <svg class="blades-svg" viewBox="0 0 100 100">
                <g transform="translate(50,50)">
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(0)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(51)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(102)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(153)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(204)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(255)"/>
                    <path class="blade-path" d="M0,-45 C15,-45 30,-30 30,-10 L0,0 Z" transform="rotate(306)"/>
                </g>
            </svg>
        </div>

        <img src="https://rgbjunkie.com/rgbjunkie.png" alt="RGB Junkie Logo" class="logo">
        
        <div class="error-group">
            <h1 class="error-code">404</h1>
            <div class="status-tag">SYSTEM_OFFLINE</div>
        </div>

        <p class="message">The requested resource has been disconnected or moved to a new hardware address.</p>

        <div id="redirect-status">
            <div style="margin-bottom: 5px;">> INITIALIZING_REROUTE...</div>
            <div style="color: #666;">> MAPPING: effectbuilder -> rgbjunkie</div>
            <div style="animation: blink 1s infinite;">> RELOCATING_ASSETS...</div>
        </div>

        <div id="manual-action">
            <a href="https://rgbjunkie.com" class="btn">REBOOT_TO_HOME</a>
        </div>

    </div>

    <script>
        var currentHost = window.location.hostname;
        if (currentHost.indexOf("github.io") !== -1) {
            document.getElementById('manual-action').style.display = 'none';
            document.getElementById('redirect-status').style.display = 'block';
            
            var redirects = { "/showcase.html": "/showcase/", "/gallery.html": "/gallery/" };
            var path = window.location.pathname;
            var newPath = redirects[path] ? redirects[path] : path.replace(".html", "");
            
            setTimeout(function() {
                window.location.replace("https://rgbjunkie.com" + newPath + window.location.hash);
            }, 3000);
        }
    </script>
</body>
</html>
