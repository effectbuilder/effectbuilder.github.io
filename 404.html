<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - System Disconnect | RGB Junkie</title>
    <style>
        :root {
            --bg-color: #020202;
            --accent-green: #a3be8c;
            --neon-glow: rgba(0, 255, 255, 0.8);
        }

        body {
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #vector-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            /* Height is now set dynamically in JS */

            /* FADES ONLY AT THE TOP */
            background: linear-gradient(to bottom, transparent, currentColor 40%);

            /* MASK: Hard cut at the bottom (95%) to kill the halo */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 1) 95%, rgba(0, 0, 0, 0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 1) 95%, rgba(0, 0, 0, 0) 100%);

            animation: move linear infinite;
        }

        @keyframes move {
            0% {
                transform: translateY(-300px);
                opacity: 0;
            }

            15% {
                opacity: 0.8;
            }

            85% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* 2. Main Hardware Content */
        .case-interior {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            gap: 25px;
            z-index: 10;
            position: relative;
            background: radial-gradient(circle, rgba(2, 2, 2, 1) 30%, transparent 90%);
        }

        h1.error-code {
            font-size: 7rem;
            font-weight: 900;
            margin: 0 0 20px 0;
            /* Top, Right, Bottom (20px), Left */
            color: #fff;
            line-height: 0.9;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow);
            animation: neonPulse 2s ease-in-out infinite;
        }

        /* Hardware & Neon styling */
        .fan-module {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fan-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid #ff0000;
            border-radius: 50%;
            animation: rgbCycle s linear infinite;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9), 0 0 20px currentColor;
        }

        .fan-hub {
            position: absolute;
            width: 42px;
            height: 42px;
            background: #000000;
            border-radius: 50%;
            z-index: 10;
            border: 1px solid #222;
        }

        .blades-svg {
            width: 88%;
            height: 88%;
            animation: spin 5s linear infinite;
            opacity: 0.95;
            overflow: visible;
        }

        .blade-path {
            animation: rgbCycle 6s linear infinite;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 0.3;
        }

        .logo {
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
        }

        .error-code {
            font-size: 7rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            line-height: 0.9;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-glow), 0 0 40px var(--neon-glow);
            animation: neonPulse 2s ease-in-out infinite;
        }

        .status-tag {
            color: var(--accent-green);
            letter-spacing: 5px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #redirect-status {
            display: none;
            background: rgba(15, 15, 15, 0.95);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-green);
            text-align: left;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        .term-line {
            margin: 6px 0;
            color: #88c0d0;
        }

        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            animation: rgbCycle 6s linear infinite;
            text-transform: uppercase;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes neonPulse {

            0%,
            100% {
                opacity: 0.9;
                text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-glow);
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 15px #fff, 0 0 30px var(--neon-glow), 0 0 50px var(--neon-glow);
            }
        }

        @keyframes rgbCycle {
            0% {
                color: #ff0000;
                fill: #ff0000;
                border-color: #ff0000;
            }

            33% {
                color: #00ff00;
                fill: #00ff00;
                border-color: #00ff00;
            }

            66% {
                color: #0000ff;
                fill: #0000ff;
                border-color: #0000ff;
            }

            100% {
                color: #ff0000;
                fill: #ff0000;
                border-color: #ff0000;
            }
        }
    </style>
</head>

<body>

    <div id="vector-canvas"></div>

    <div class="case-interior">
        <div class="fan-module">
            <div class="fan-ring"></div>
            <div class="fan-hub"></div>
            <svg id="main-fan" class="blades-svg" viewBox="0 0 100 100">
                <g transform="translate(50,50) scale(1.2)">
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(0)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(51.4)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(102.8)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(154.2)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(205.6)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(257)" />
                    <path class="blade-path" d="m -3.5 -42 c 0 0 13.393 -3.34 20.7 2.6 c 4.911 4.519 0.5 27 -2.2 31.7 c -4.5 7.5 -8.4 12 -14.7 18.4 c 1.9 -11.5 3.8 -16.2 3 -23.5 c -0.7 -7.4 -2 -15.3 -7.7 -26.8 c 0 0 -0.67 -1.96 0.9 -2.4 z" transform="rotate(308.4)" />
                </g>
            </svg>
        </div>

        <img src="https://rgbjunkie.com/rgbjunkie.png" alt="RGB Junkie Logo" class="logo">

        <div class="error-group">
            <h1 id="status-header" class="error-code" style="margin-bottom: 25px;">404</h1>
            <div id="status-sub" class="status-tag">CONNECTION_LOST</div>
        </div>

        <div id="manual-msg">
            <p style="color: #888; margin-bottom: 45px; line-height: 1.6; max-width: 320px;">
                It looks like this LED went dark. <br>
                The path you followed is currently offline.
            </p>
            <a href="https://rgbjunkie.com" class="btn">TAKE_ME_TO_THE_LIGHT</a>
        </div>

        <div id="redirect-ui" style="display:none; width: 100%;">
            <p style="color: #88c0d0; font-family: monospace; margin-bottom: 10px;">> REROUTING_DATA_STREAM...</p>
            <div style="width: 100%; height: 4px; background: #111; border-radius: 2px; overflow: hidden; margin-bottom: 20px;">
                <div id="sync-bar" style="width: 0%; height: 100%; background: #00ffff; box-shadow: 0 0 10px #00ffff; transition: width 3s linear;"></div>
            </div>
            <div style="text-align: left; background: rgba(15,15,15,0.9); padding: 15px; border-radius: 5px; border-left: 3px solid #00ffff; font-size: 0.85rem;">
                <div style="color: #666; margin-bottom: 5px;">SOURCE: effectbuilder.github.io</div>
                <div style="color: #a3be8c;">TARGET: rgbjunkie.com [ESTABLISHED]</div>
            </div>
        </div>
    </div>

    <script>
        // PARTICLE GENERATOR (Existing Logic)
        const canvas = document.getElementById('vector-canvas');
        for (let i = 0; i < 45; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = (Math.random() * 100) + 'vh';
            p.style.height = (Math.floor(Math.random() * 140) + 80) + 'px';
            p.style.animationDuration = (Math.random() * 4 + 3) + 's';
            p.style.animationDelay = (Math.random() * -5) + 's';
            let color = Math.random() > 0.5 ? '#00ffff' : '#ff00ff';
            p.style.color = color;
            p.style.boxShadow = `0 0 12px ${color}`;
            canvas.appendChild(p);
        }

        // REDIRECT LOGIC
        var currentHost = window.location.hostname;
        if (currentHost.indexOf("github.io") !== -1) {
            // Swap UI Elements
            document.getElementById('manual-msg').style.display = 'none';
            document.getElementById('redirect-ui').style.display = 'block';

            document.getElementById('status-header').innerText = "SYNC";
            document.getElementById('status-header').style.fontSize = "5rem"; // Shrink slightly to fit word
            document.getElementById('status-sub').innerText = "ESTABLISHING_LINK";

            // Speed up the fan for the "Sync" process
            document.getElementById('main-fan').style.animationDuration = "0.8s";

            // Animate the progress bar
            setTimeout(() => {
                document.getElementById('sync-bar').style.width = "100%";
            }, 100);

            // Redirect after 3.5 seconds
            var redirects = { "/showcase.html": "/showcase/", "/gallery.html": "/gallery/" };
            var path = window.location.pathname;
            var newPath = redirects[path] ? redirects[path] : path.replace(".html", "");

            setTimeout(() => {
                window.location.replace("https://rgbjunkie.com" + newPath + window.location.hash);
            }, 3500);
        }
    </script>
    </div>

    <script>
        const canvas = document.getElementById('vector-canvas');
        const count = 50;

        for (let i = 0; i < count; i++) {
            let p = document.createElement('div');
            p.className = 'particle';

            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = (Math.random() * 100) + 'vh';

            // RANDOM LENGTH: Between 80px and 220px
            p.style.height = (Math.floor(Math.random() * 140) + 80) + 'px';

            p.style.animationDuration = (Math.random() * 1.5 + 3) + 's';
            p.style.animationDelay = (Math.random() * -5) + 's';

            let color = Math.random() > 0.5 ? '#00ffff' : '#ff00ff';

            p.style.color = color;
            p.style.boxShadow = `0 0 12px ${color}`;

            canvas.appendChild(p);
        }

        if (window.location.hostname.indexOf("github.io") !== -1) {
            document.getElementById('manual-msg').style.display = 'none';
            document.getElementById('redirect-status').style.display = 'block';
            var redirects = { "/showcase.html": "/showcase/", "/gallery.html": "/gallery/" };
            var path = window.location.pathname;
            var newPath = redirects[path] ? redirects[path] : path.replace(".html", "");
            setTimeout(() => { window.location.replace("https://rgbjunkie.com" + newPath + window.location.hash); }, 3500);
        }
    </script>
</body>

</html>
