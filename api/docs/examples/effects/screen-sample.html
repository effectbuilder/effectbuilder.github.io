<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Screen Prism</title>
  <meta name="description" content="Creative desktop capture lab — pixel LED blocks, motion trails, profile duotone, kaleidoscope mirrors, edge glow, CRT scanlines, and more." />
  <meta name="developer" content="RGBJunkie" />
  <meta name="tags" content="screen, ambient, capture, mirror, duotone, demo" />
  <!-- Sidebar tabs: Display (host) → Look → Processing. Metas below are Processing-first on purpose — groupOrder wins. -->
  <meta name="groupOrder" content="Display, Look, Processing" />

  <!-- Host injects Display / Capture rate / Capture size when this API is used — do not declare those metas. -->
  <meta property="pixelBlocks" label="Pixel block size" type="number" min="2" max="48" default="8" group="Processing"
    tooltip="Block size for Pixel LED mode." />
  <meta property="trailAmount" label="Trail blend (%)" type="number" min="0" max="95" default="35" group="Processing"
    tooltip="How much of the previous frame is kept (Soft Trail)." />
  <meta property="saturation" label="Saturation (%)" type="number" min="0" max="200" default="100" group="Processing" />
  <meta property="contrast" label="Contrast (%)" type="number" min="50" max="200" default="100" group="Processing" />
  <meta property="brightness" label="Brightness (%)" type="number" min="50" max="200" default="100" group="Processing" />
  <meta property="vignette" label="Vignette (%)" type="number" min="0" max="100" default="25" group="Processing" />
  <meta property="scanlines" label="Scanlines (%)" type="number" min="0" max="100" default="0" group="Processing" />
  <meta property="edgeStrength" label="Edge glow (%)" type="number" min="0" max="100" default="45" group="Processing" />
  <meta property="displayMode" label="Look" type="combobox"
    values="Direct,Pixel LED,Soft Trail,Duotone,Edge Glow,Kaleidoscope,Vignette Mood,Scanline CRT,Saturate Pop"
    default="Direct" group="Look"
    tooltip="How the captured desktop is rendered onto the LED canvas." />
  <meta property="colorProfile" label="Color profile" type="colorProfile" default="Sunset" group="Look"
    tooltip="Used by Duotone and tint-style modes." />

  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <script>
    const canvas = document.getElementById("fx");
    const ctx = canvas.getContext("2d");
    const work = document.createElement("canvas");
    const wctx = work.getContext("2d", { willReadFrequently: true });
    const trail = document.createElement("canvas");
    const tctx = trail.getContext("2d");
    const edge = document.createElement("canvas");
    const ectx = edge.getContext("2d", { willReadFrequently: true });

    ctx.imageSmoothingEnabled = true;
    try { ctx.imageSmoothingQuality = "high"; } catch (_) {}

    function readProps() {
      return {
        mode: typeof displayMode !== "undefined" ? displayMode : "Direct",
        blocks: Math.max(2, Math.min(48, Number(typeof pixelBlocks !== "undefined" ? pixelBlocks : 8) || 8)),
        trail: Math.max(0, Math.min(0.95, (Number(typeof trailAmount !== "undefined" ? trailAmount : 35) || 0) / 100)),
        sat: Math.max(0, (Number(typeof saturation !== "undefined" ? saturation : 100) || 100) / 100),
        contrast: Math.max(0.5, (Number(typeof contrast !== "undefined" ? contrast : 100) || 100) / 100),
        bright: Math.max(0.5, (Number(typeof brightness !== "undefined" ? brightness : 100) || 100) / 100),
        vignette: Math.max(0, Math.min(1, (Number(typeof vignette !== "undefined" ? vignette : 25) || 0) / 100)),
        scan: Math.max(0, Math.min(1, (Number(typeof scanlines !== "undefined" ? scanlines : 0) || 0) / 100)),
        edge: Math.max(0, Math.min(1, (Number(typeof edgeStrength !== "undefined" ? edgeStrength : 45) || 0) / 100)),
      };
    }

    function syncCanvas() {
      if (typeof rgbjSetupCanvas === "function") rgbjSetupCanvas(canvas);
      const w = Math.max(1, canvas.width | 0);
      const h = Math.max(1, canvas.height | 0);
      if (work.width !== w || work.height !== h) {
        work.width = w;
        work.height = h;
        trail.width = w;
        trail.height = h;
        edge.width = w;
        edge.height = h;
      }
    }

    function hexToRgb(hex) {
      const s = String(hex || "#ffffff").replace("#", "").slice(0, 6);
      return { r: parseInt(s.slice(0, 2), 16) || 0, g: parseInt(s.slice(2, 4), 16) || 0, b: parseInt(s.slice(4, 6), 16) || 0 };
    }

    function duotoneRgb(lum) {
      lum = Math.max(0, Math.min(1, lum));
      if (typeof colorProfileStops !== "undefined" && colorProfileStops.length >= 2) {
        const stops = colorProfileStops;
        const n = stops.length - 1;
        const i = Math.min(n - 1, Math.floor(lum * n));
        const t = n > 0 ? (lum * n - i) : 0;
        const a = hexToRgb(stops[i]);
        const b = hexToRgb(stops[Math.min(i + 1, stops.length - 1)]);
        return {
          r: a.r + (b.r - a.r) * t,
          g: a.g + (b.g - a.g) * t,
          b: a.b + (b.b - a.b) * t,
        };
      }
      if (typeof rgbjColorFromProfile === "function") {
        const prof = typeof colorProfile !== "undefined" ? colorProfile : "Sunset";
        return rgbjColorFromProfile(prof, lum, null);
      }
      return { r: lum * 255, g: lum * 128, b: (1 - lum) * 255 };
    }

    function drawSource(bmp, w, h) {
      wctx.clearRect(0, 0, w, h);
      wctx.drawImage(bmp, 0, 0, w, h);
    }

    function applyGrade(targetCtx, w, h, p) {
      if (p.sat === 1 && p.contrast === 1 && p.bright === 1) return;
      const img = targetCtx.getImageData(0, 0, w, h);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        let r = d[i] / 255;
        let g = d[i + 1] / 255;
        let b = d[i + 2] / 255;
        r = (r - 0.5) * p.contrast + 0.5;
        g = (g - 0.5) * p.contrast + 0.5;
        b = (b - 0.5) * p.contrast + 0.5;
        r *= p.bright;
        g *= p.bright;
        b *= p.bright;
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        r = gray + (r - gray) * p.sat;
        g = gray + (g - gray) * p.sat;
        b = gray + (b - gray) * p.sat;
        d[i] = Math.max(0, Math.min(255, r * 255));
        d[i + 1] = Math.max(0, Math.min(255, g * 255));
        d[i + 2] = Math.max(0, Math.min(255, b * 255));
      }
      targetCtx.putImageData(img, 0, 0);
    }

    function renderPixelLed(w, h, block) {
      const sw = Math.max(2, Math.ceil(w / block));
      const sh = Math.max(2, Math.ceil(h / block));
      const tiny = document.createElement("canvas");
      tiny.width = sw;
      tiny.height = sh;
      const t = tiny.getContext("2d");
      t.drawImage(work, 0, 0, sw, sh);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tiny, 0, 0, sw, sh, 0, 0, w, h);
      ctx.imageSmoothingEnabled = true;
    }

    function renderDuotone(w, h) {
      const small = document.createElement("canvas");
      const sw = Math.min(160, w);
      const sh = Math.min(120, h);
      small.width = sw;
      small.height = sh;
      const sctx = small.getContext("2d", { willReadFrequently: true });
      sctx.drawImage(work, 0, 0, sw, sh);
      const img = sctx.getImageData(0, 0, sw, sh);
      const out = ctx.createImageData(w, h);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const sx = Math.min(sw - 1, (x * sw / w) | 0);
          const sy = Math.min(sh - 1, (y * sh / h) | 0);
          const si = (sy * sw + sx) * 4;
          const lum = (img.data[si] * 0.299 + img.data[si + 1] * 0.587 + img.data[si + 2] * 0.114) / 255;
          const c = duotoneRgb(lum);
          const oi = (y * w + x) * 4;
          out.data[oi] = c.r;
          out.data[oi + 1] = c.g;
          out.data[oi + 2] = c.b;
          out.data[oi + 3] = 255;
        }
      }
      ctx.putImageData(out, 0, 0);
    }

    function renderEdgeGlow(w, h, strength) {
      const sw = Math.min(120, w);
      const sh = Math.min(80, h);
      edge.width = sw;
      edge.height = sh;
      ectx.drawImage(work, 0, 0, sw, sh);
      const src = ectx.getImageData(0, 0, sw, sh);
      const out = ectx.createImageData(sw, sh);
      const d = src.data;
      const o = out.data;
      for (let y = 1; y < sh - 1; y++) {
        for (let x = 1; x < sw - 1; x++) {
          const i = (y * sw + x) * 4;
          const l =
            d[i] * -1 +
            d[i + 4] * -1 +
            d[i - 4] * -1 +
            d[i + sw * 4] * -1 +
            d[i - sw * 4] * -1 +
            d[i + sw * 4 + 4] * -1 +
            d[i + sw * 4 - 4] * -1 +
            d[i - sw * 4 + 4] * -1 +
            d[i - sw * 4 - 4] * -1 +
            d[i] * 8;
          const v = Math.max(0, Math.min(255, l));
          o[i] = v;
          o[i + 1] = v;
          o[i + 2] = v;
          o[i + 3] = 255;
        }
      }
      ectx.putImageData(out, 0, 0);
      ctx.drawImage(work, 0, 0, w, h);
      ctx.globalCompositeOperation = "screen";
      ctx.globalAlpha = strength;
      ctx.drawImage(edge, 0, 0, sw, sh, 0, 0, w, h);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";
    }

    function renderKaleidoscope(w, h) {
      const hw = w * 0.5;
      const hh = h * 0.5;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(work, 0, 0, hw, hh, 0, 0, hw, hh);
      ctx.save();
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(work, 0, 0, hw, hh, 0, 0, hw, hh);
      ctx.restore();
      ctx.save();
      ctx.translate(0, h);
      ctx.scale(1, -1);
      ctx.drawImage(work, 0, 0, hw, hh, 0, 0, hw, hh);
      ctx.restore();
      ctx.save();
      ctx.translate(w, h);
      ctx.scale(-1, -1);
      ctx.drawImage(work, 0, 0, hw, hh, 0, 0, hw, hh);
      ctx.restore();
    }

    function overlayVignette(w, h, amount) {
      if (amount <= 0) return;
      const g = ctx.createRadialGradient(w * 0.5, h * 0.5, Math.min(w, h) * 0.15, w * 0.5, h * 0.5, Math.max(w, h) * 0.72);
      g.addColorStop(0, "rgba(0,0,0,0)");
      g.addColorStop(1, `rgba(0,0,0,${amount})`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function overlayScanlines(w, h, amount) {
      if (amount <= 0) return;
      const gap = Math.max(2, 4 - Math.floor(amount * 2));
      ctx.fillStyle = `rgba(0,0,0,${amount * 0.35})`;
      for (let y = 0; y < h; y += gap) {
        ctx.fillRect(0, y, w, 1);
      }
    }

    function drawPlaceholder(w, h, t) {
      const g = ctx.createLinearGradient(0, 0, w, 0);
      const hue = (t * 40) % 360;
      g.addColorStop(0, `hsl(${hue}, 70%, 35%)`);
      g.addColorStop(1, `hsl(${(hue + 80) % 360}, 70%, 55%)`);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.font = "12px system-ui,sans-serif";
      ctx.fillText("Screen capture — open in RGBJunkie", 8, 18);
    }

    function renderFrame(bmp, p, w, h) {
      drawSource(bmp, w, h);
      applyGrade(wctx, w, h, p);

      if (p.mode === "Soft Trail" && p.trail > 0) {
        ctx.globalAlpha = 1;
        ctx.drawImage(trail, 0, 0, w, h);
        ctx.globalAlpha = 1 - p.trail;
        ctx.drawImage(work, 0, 0, w, h);
        ctx.globalAlpha = 1;
        tctx.globalAlpha = 1;
        tctx.drawImage(canvas, 0, 0, w, h);
        return;
      }

      if (p.mode === "Pixel LED") {
        renderPixelLed(w, h, p.blocks);
      } else if (p.mode === "Duotone") {
        renderDuotone(w, h);
      } else if (p.mode === "Edge Glow") {
        renderEdgeGlow(w, h, p.edge);
      } else if (p.mode === "Kaleidoscope") {
        renderKaleidoscope(w, h);
      } else {
        ctx.drawImage(work, 0, 0, w, h);
      }

      if (p.mode === "Vignette Mood" || p.vignette > 0) {
        overlayVignette(w, h, p.mode === "Vignette Mood" ? Math.max(p.vignette, 0.55) : p.vignette);
      }
      if (p.mode === "Scanline CRT" || p.scan > 0) {
        overlayScanlines(w, h, p.mode === "Scanline CRT" ? Math.max(p.scan, 0.45) : p.scan);
      }
      if (p.mode === "Saturate Pop") {
        ctx.globalCompositeOperation = "screen";
        ctx.globalAlpha = 0.15;
        ctx.drawImage(work, 0, 0, w, h);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
      }
    }

    async function loop() {
      const t0 = performance.now() / 1000;
      try {
        syncCanvas();
        const w = canvas.width;
        const h = canvas.height;
        const p = readProps();

        if (typeof engine !== "undefined" && typeof engine.requestNativeScreenBitmap === "function") {
          const bmp = await engine.requestNativeScreenBitmap();
          renderFrame(bmp, p, w, h);
          bmp.close();
        } else {
          drawPlaceholder(w, h, t0);
        }
      } catch (err) {
        console.warn("[screen-sample]", err);
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
