<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skydimo LUA Builder | RGBJunkie</title>
    <meta name="description" content="Build Skydimo-compatible LUA lighting effects with a live LED preview and generated code.">

    <meta property="og:title" content="Skydimo LUA Builder | RGBJunkie">
    <meta property="og:description" content="Build Skydimo-compatible LUA lighting effects with a live LED preview and generated code.">
    <meta property="og:image" content="https://www.rgbjunkie.com/images/rgbjunkie.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:domain" content="rgbjunkie.com">
    <meta name="twitter:url" content="https://rgbjunkie.com/skydimo">
    <meta name="twitter:title" content="Skydimo LUA Builder | RGBJunkie">
    <meta name="twitter:description" content="Build Skydimo-compatible LUA lighting effects with a live LED preview and generated code.">
    <meta name="twitter:image" content="https://www.rgbjunkie.com/images/rgbjunkie.png">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <link rel="icon" type="image/x-icon" href="/rgbjunkielogo2.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../styles-alt.css">
</head>

<body class="d-flex flex-column vh-100">

    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom border-secondary border-opacity-25">
        <div class="container-fluid">
            <div class="dropdown me-3 brand-dropdown-wrapper">
                <a class="navbar-brand d-flex align-items-center me-0 brand-dropdown-toggle brand-toggle-btn" href="#" role="button" data-bs-toggle="dropdown" data-bs-display="static" aria-expanded="false">
                    <img src="/images/rgbjunkielogo2.png" alt="" class="me-2 brand-logo-img">
                    <span class="text-truncate" data-i18n="nav_title">Skydimo LUA Builder</span>
                    <i class="bi bi-chevron-down ms-2 dropdown-indicator"></i>
                </a>
                <ul class="dropdown-menu shadow custom-dropdown-menu">
                    <li><a class="dropdown-item" href="/">RGBJunkie home</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="/effect-builder/" data-i18n="nav_dd_effect_builder">RGBJunkie Effect Builder</a></li>
                    <li><a class="dropdown-item" href="/builder/" data-i18n="nav_dd_component_builder">RGBJunkie Component Builder</a></li>
                    <li><a class="dropdown-item" href="/combiner/" data-i18n="nav_dd_combiner">RGBJunkie Effect Combiner</a></li>
                    <li><a class="dropdown-item active" href="/skydimo/" aria-current="page" data-i18n="nav_dd_skydimo">Skydimo LUA Builder</a></li>
                </ul>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#skydimoNavbar" aria-controls="skydimoNavbar" aria-expanded="false" aria-label="Toggle navigation" data-i18n-aria-label="aria_nav_toggle">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="skydimoNavbar">
                <div class="d-flex flex-grow-1 flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mt-3 mt-lg-0 w-100">
                    <div class="d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-3 flex-wrap">
                        <div class="btn-group" role="group" data-i18n-aria-label="aria_community">
                            <a href="/gallery/" class="btn btn-primary"><i class="bi bi-collection me-1"></i><span data-i18n="btn_gallery">Gallery</span></a>
                            <a href="/showcase/" class="btn btn-primary"><i class="bi bi-stars me-1"></i><span data-i18n="btn_showcase">Effect Showcase</span></a>
                        </div>
                        <div class="btn-group" role="group" data-i18n-aria-label="aria_settings">
                            <button class="btn btn-secondary" type="button" id="theme-switcher-btn" data-i18n-title="theme_toggle_title" title="Toggle light/dark theme">
                                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                                <span class="ms-1" data-i18n="btn_theme_label">Theme</span>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex align-items-center ms-lg-auto">
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="skydimo-lang-btn" data-bs-toggle="dropdown" data-bs-auto-close="true" data-i18n-title="lang_switcher_title" title="Language" aria-expanded="false">
                                <i class="bi bi-translate" aria-hidden="true"></i>
                                <span class="d-none d-md-inline ms-1" id="skydimo-lang-label">English</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="en">English</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="es">Español</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="fr">Français</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="de">Deutsch</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="pt">Português</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="zh-CN">中文</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="hi">हिन्दी</button></li>
                                <li><button type="button" class="dropdown-item skydimo-lang-item" data-lang="ja">日本語</button></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid flex-grow-1 overflow-hidden p-0 d-flex flex-column min-vh-0">
        <div class="skydimo-split flex-grow-1 d-flex flex-row min-vh-0 overflow-hidden">

            <aside id="skydimo-sidebar" class="skydimo-sidebar bg-body-tertiary border-end border-secondary border-opacity-25 d-flex flex-column flex-shrink-0 min-vh-0">
                <div id="skydimo-sidebar-scroll" class="skydimo-sidebar-scroll flex-grow-1 overflow-y-auto px-3 pt-3 pb-2">

                    <h6 class="text-body-secondary text-uppercase small fw-semibold border-bottom border-secondary border-opacity-25 pb-2 mb-3" data-i18n="section_presets">Presets</h6>
                    <div class="control-group rounded border border-secondary border-opacity-50 bg-body-secondary bg-opacity-25 p-2 mb-3">
                        <label for="preset-name" class="form-label small mb-1" data-i18n="lbl_preset_name">Preset name</label>
                        <div class="input-group input-group-sm mb-2">
                            <input type="text" class="form-control" id="preset-name" data-i18n-ph="ph_preset_name" placeholder="My cool effect" autocomplete="off">
                            <button type="button" class="btn btn-primary" id="save-preset-btn" data-i18n="btn_save_preset">Save</button>
                        </div>
                        <div id="presets-list" class="list-group list-group-flush skydimo-presets-list"></div>
                    </div>

                    <h6 class="text-body-secondary text-uppercase small fw-semibold border-bottom border-secondary border-opacity-25 pb-2 mb-3" data-i18n="section_effect">Effect</h6>
                    <div class="mb-3">
                        <label for="effect-type" class="form-label small mb-1" data-i18n="lbl_effect_type">Effect type</label>
                        <select id="effect-type" class="form-select form-select-sm">
                            <optgroup label="Solid &amp; Basic">
                                <option value="solid">Solid Color</option>
                                <option value="rainbow">Rainbow</option>
                                <option value="audio_idle">Audio (idle)</option>
                            </optgroup>
                            <optgroup label="1D Wave &amp; Motion">
                                <option value="wave">Wave</option>
                                <option value="scanner">Scanner</option>
                                <option value="sweep">Sweep</option>
                                <option value="breathing">Breathing</option>
                                <option value="strobe">Strobe</option>
                                <option value="comet">Comet</option>
                                <option value="sine_pulse">Sine Pulse</option>
                                <option value="bounce_sine">Bounce Sine</option>
                                <option value="fire">Fire</option>
                                <option value="sparkle">Sparkle</option>
                                <option value="theater">Theater Chase</option>
                                <option value="police">Police Lights</option>
                                <option value="glitch">Glitch</option>
                            </optgroup>
                            <optgroup label="2D Patterns &amp; Grids">
                                <option value="matrix_rain">Matrix Rain</option>
                                <option value="grid_scan">Grid Scan</option>
                                <option value="v_sweep">Vertical Sweep</option>
                                <option value="radial_pulse">Radial Pulse</option>
                                <option value="diagonal_wave">Diagonal Wave</option>
                                <option value="aurora" selected>Aurora</option>
                                <option value="plasma">Plasma</option>
                                <option value="heartbeat">Heartbeat</option>
                                <option value="helix">Helix</option>
                                <option value="dual_sine">Dual Sine</option>
                                <option value="ripple">Ripple</option>
                                <option value="radar">Radar Sweep</option>
                                <option value="waterfall">Waterfall</option>
                                <option value="vortex">Vortex</option>
                                <option value="kaleidoscope">Kaleidoscope</option>
                            </optgroup>
                            <optgroup label="Extended">
                                <option value="snake_chase">Snake chase</option>
                                <option value="fill_wipe">Fill wipe</option>
                                <option value="ping_pong">Ping pong</option>
                                <option value="twinkle_soft">Twinkle (soft)</option>
                                <option value="meteor_shower">Meteor shower</option>
                                <option value="hue_rotation">Hue rotation</option>
                                <option value="dual_meet">Dual meet</option>
                                <option value="ping_pong_dual">Ping pong dual</option>
                                <option value="stripe_slide">Stripe slide</option>
                                <option value="beam_soft">Soft beam</option>
                                <option value="rings_multi">Concentric rings</option>
                                <option value="noise_cloud">Noise cloud</option>
                                <option value="echo_chase">Echo chase</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="brightness" class="form-label small mb-1"><span data-i18n="lbl_brightness">Brightness</span> (<output id="brightness-num" class="d-inline font-monospace" for="brightness">100</output><span data-i18n="sym_percent">%</span>)</label>
                        <input type="range" class="form-range" id="brightness" min="0" max="100" value="100">
                    </div>

                    <div class="mb-3">
                        <label for="speed" class="form-label small mb-1"><span data-i18n="lbl_speed">Speed</span> (<output id="speed-num" class="d-inline font-monospace" for="speed">1000</output>)</label>
                        <input type="range" class="form-range" id="speed" min="0" max="2000" value="1000">
                    </div>

                    <div class="mb-3">
                        <label for="color" class="form-label small mb-1" data-i18n="lbl_primary_color">Primary color</label>
                        <input type="color" class="form-control form-control-color w-100" id="color" value="#0000ff" data-i18n-title="title_primary_color" title="Primary color">
                    </div>

                    <div class="mb-3">
                        <label for="color2" class="form-label small mb-1" data-i18n="lbl_secondary_color">Secondary color</label>
                        <input type="color" class="form-control form-control-color w-100" id="color2" value="#ff0000" data-i18n-title="title_secondary_color" title="Secondary color">
                    </div>

                    <button type="button" id="reset-btn" class="btn btn-outline-danger w-100 mb-2" data-i18n="btn_reset_defaults">Reset to defaults</button>
                </div>
            </aside>

            <main class="skydimo-main flex-grow-1 min-vh-0 d-flex flex-column overflow-hidden bg-body">
                <div class="skydimo-preview-wrap flex-grow-1 min-vh-0 d-flex align-items-center justify-content-center p-3">
                    <div class="skydimo-preview-inner w-100 h-100 d-flex flex-column min-vh-0">
                        <span class="text-body-secondary text-uppercase small fw-semibold mb-2" data-i18n="lbl_live_preview">Live preview</span>
                        <div class="skydimo-canvas-shell flex-grow-1 min-h-0 d-flex align-items-center justify-content-center rounded border border-secondary overflow-hidden">
                            <canvas id="preview-canvas" width="800" height="300"></canvas>
                        </div>
                    </div>
                </div>

                <div class="skydimo-output border-top border-secondary border-opacity-25 bg-body-tertiary p-3 flex-shrink-0">
                    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
                        <label for="lua-output" class="form-label small mb-0 text-body-secondary text-uppercase fw-semibold" data-i18n="lbl_generated_lua">Generated LUA</label>
                        <button type="button" id="copy-btn" class="btn btn-primary btn-sm">
                            <i class="bi bi-clipboard me-1" aria-hidden="true"></i>
                            <span data-i18n="btn_copy_lua">Copy to clipboard</span>
                        </button>
                    </div>
                    <textarea id="lua-output" class="form-control font-monospace small skydimo-lua-textarea" readonly rows="8"></textarea>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>

</html>
