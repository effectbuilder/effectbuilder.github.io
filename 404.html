<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Critical RGB Error | RGB Junkie</title>
    <style>
        :root {
            --bg-deep: #050505;
            --rgb-glow: #00ff00; /* Initial color, will be overridden by animation */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-deep);
            color: #d8dee9;
            text-align: center;
            overflow: hidden;
        }

        /* 1. Animations */
        @keyframes fanSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes rgbCycle {
            0%   { color: #ff0000; fill: #ff0000; filter: drop-shadow(0 0 8px #ff0000); border-color: #ff0000; }
            33%  { color: #00ff00; fill: #00ff00; filter: drop-shadow(0 0 8px #00ff00); border-color: #00ff00; }
            66%  { color: #0000ff; fill: #0000ff; filter: drop-shadow(0 0 8px #0000ff); border-color: #0000ff; }
            100% { color: #ff0000; fill: #ff0000; filter: drop-shadow(0 0 8px #ff0000); border-color: #ff0000; }
        }

        @keyframes textGlow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* 2. Fan Styling */
        .fan-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Outer LED Ring */
        .fan-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #ff0000;
            border-radius: 50%;
            animation: rgbCycle 6s linear infinite;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        /* The Actual Blades */
        .blades-svg {
            width: 85%;
            height: 85%;
            animation: fanSpin 2s linear infinite, rgbCycle 6s linear infinite;
            opacity: 0.9;
        }

        /* Metallic Hub */
        .hub {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #444 0%, #111 80%);
            border-radius: 50%;
            z-index: 10;
            border: 1px solid #222;
        }

        /* 3. Text and Layout */
        .logo { max-width: 280px; margin-bottom: 10px; }
        
        h1.error-code {
            font-size: 8rem;
            margin: -10px 0;
            color: #fff;
            text-shadow: 0 0 15px #ffffff88, 0 0 30px #00ffff;
            animation: textGlow 2s ease-in-out infinite;
        }

        h2 { color: #a3be8c; letter-spacing: 2px; margin-bottom: 5px; }
        p { color: #999; max-width: 400px; line-height: 1.5; }

        .btn {
            margin-top: 30px;
            padding: 10px 30px;
            background: transparent;
            color: #ff0000;
            border: 2px solid #ff0000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            animation: rgbCycle 6s linear infinite;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.05); }

        /* Background Depth */
        .bg-fan {
            position: absolute;
            opacity: 0.05;
            z-index: -1;
        }

        #redirect-status { display: none; margin-top: 20px; color: #88c0d0; }
    </style>
</head>
<body>

    <div class="bg-fan" style="left: 10%; top: 20%; transform: scale(2);"><div class="fan-container"><div class="fan-ring" style="animation-duration: 10s;"></div></div></div>
    <div class="bg-fan" style="right: 10%; bottom: 20%; transform: scale(1.5);"><div class="fan-container"><div class="fan-ring" style="animation-duration: 8s;"></div></div></div>

    <div class="fan-container">
        <div class="fan-ring"></div>
        <div class="hub"></div>
        <svg class="blades-svg" viewBox="0 0 100 100">
            <g transform="translate(50,50)">
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(0)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(51)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(102)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(153)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(204)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(255)"/>
                <path d="M0,-45 C15,-45 25,-30 25,-10 L0,0 Z" transform="rotate(306)"/>
            </g>
        </svg>
    </div>

    <img src="https://rgbjunkie.com/rgbjunkie.png" alt="RGB Junkie Logo" class="logo">
    
    <h1 class="error-code">404</h1>
    <h2>PAGE.NOT_FOUND</h2>
    <p>Something unplugged. The page you are looking for has gone offline.</p>

    <div id="redirect-status">
        <p><strong>RE_ROUTING:</strong> Detecting old link... Redirecting to <strong>RGB Junkie</strong> hub.</p>
    </div>

    <div id="manual-404">
        <a href="https://rgbjunkie.com" class="btn">REBOOT_TO_HOME</a>
    </div>

    <script>
        // Keeping your logic for the GitHub -> RGBJunkie redirect
        var currentHost = window.location.hostname;
        if (currentHost.indexOf("github.io") !== -1) {
            document.getElementById('manual-404').style.display = 'none';
            document.getElementById('redirect-status').style.display = 'block';
            
            var redirects = { "/showcase.html": "/showcase/", "/gallery.html": "/gallery/" };
            var path = window.location.pathname;
            var newPath = redirects[path] ? redirects[path] : path.replace(".html", "");
            
            setTimeout(function() {
                window.location.replace("https://rgbjunkie.com" + newPath + window.location.hash);
            }, 2000);
        }
    </script>
</body>
</html>
