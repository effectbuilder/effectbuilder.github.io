<!DOCTYPE html>
<html>

<head>
    <title>One Piece: Grand Line Voyage</title>
    <meta title="One Piece: Grand Line Voyage">
    <meta description="Command the high seas with a reactive landscape that surges to your music. Watch as Haki lightning strikes and the ocean rises with the beat of your setup." />
    <meta publisher="José Miranda" />

    <meta property="speed" label="Sailing Speed" type="number" min="0" max="100" default="40" tooltip="How fast the waves, clouds, and flying objects move.">
    <meta property="wave_intensity" label="Wave Turbulence" type="number" min="1" max="100" default="22" tooltip="The height and chaos of the ocean waves.">
    <meta property="item_count" label="Flying Debris Count" type="number" min="0" max="50" default="15" tooltip="The amount of pirate debris caught in the storm.">

    <meta property="show_haki" label="Conqueror's Haki" type="boolean" default="true" tooltip="Enable audio-reactive lightning strikes.">
    <meta property="show_logo" label="Emblem" type="boolean" default="true" tooltip="Enable audio-reactive emblem.">

    <meta property="haki_sensitivity" label="Haki Sensitivity" type="number" min="1" max="100" default="100" tooltip="How easily bass triggers lightning strikes.">

    <meta property="profile" label="Sea Region" type="combobox" values="Custom,East Blue,Grand Line,Wano Kuni,Enies Lobby,Skypiea,Fishman Island,Whole Cake Island,Marineford,Punk Hazard,Dressrosa,Thriller Bark,Impel Down,Zou,Alabasta,Loguetown,Reverse Mountain,Water 7,Sabaody,Raileygh,Rainbow Mist" default="Reverse Mountain" tooltip="Select a color profile inspired by different One Piece locations.">

    <meta property="color1" label="Sky Color (Custom)" type="color" default="#002244" tooltip="Custom color for the upper sky.">
    <meta property="color2" label="Ocean Color (Custom)" type="color" default="#000033" tooltip="Custom color for the deep water.">
    <meta property="color3" label="Sun/Energy Color (Custom)" type="color" default="#8b0000" tooltip="Custom color for the sun and energy effects.">
    <meta property="color4" label="Lightning Color (Custom)" type="color" default="#ffffff" tooltip="Color for the lightning effects.">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        #start-overlay {
            display: none;
        }
    </style>
</head>

<body>
    <div id="start-overlay"></div>
    <canvas id="effect-canvas" width="320" height="200"></canvas>

    <script>
        // -------------------------------------------------------------------
        // BROWSER COMPATIBILITY LAYER & AUTO-VARIABLE CREATION
        // -------------------------------------------------------------------

        if (typeof window.engine === 'undefined') {
            const metaTags = document.querySelectorAll('meta[property]');
            metaTags.forEach(meta => {
                const propName = meta.getAttribute('property');
                const propType = meta.getAttribute('type');
                const defaultVal = meta.getAttribute('default');
                if (propName) {
                    let finalValue = defaultVal;
                    if (propType === 'number') finalValue = parseFloat(defaultVal);
                    else if (propType === 'boolean') finalValue = (defaultVal === 'true' || defaultVal === '1');
                    window[propName] = finalValue;
                }
            });

            window.engine = { audio: { freq: new Array(128).fill(0) } };

            function simulateAudio() {
                const time = Date.now() / 1000;
                const dataArray = new Array(128).fill(0);

                // Bass: Strong pulses
                const beat = (Math.sin(time * Math.PI * 4) + 1) / 2;
                const bassVal = Math.pow(beat, 4) * 255;
                dataArray[0] = bassVal; dataArray[1] = bassVal; dataArray[2] = bassVal;

                // Treble
                for (let i = 10; i < 40; i++) {
                    const wave = (Math.sin(time * 8 + i * 0.5) + 1) / 2;
                    dataArray[i] = wave * 150 + (Math.random() * 50);
                }
                window.engine.audio.freq = dataArray;
                requestAnimationFrame(simulateAudio);
            }
            simulateAudio();
        } else {
            document.getElementById('start-overlay').style.display = 'none';
        }
    </script>

    <script>
        const canvas = document.getElementById('effect-canvas');
        const ctx = canvas.getContext('2d');
        const W = 320;
        const H = 200;

        // Force pixelated rendering natively via context
        ctx.imageSmoothingEnabled = false;

        let time = 0;
        let lightning = [];
        let floatingItems = [];
        let clouds = [];
        let islands = [];
        let ships = [];

        // Deep Colors Only - No Whites or Light Pastels
        const profiles = {
            "East Blue": ["#003366", "#000033", "#CC5500"],
            "Grand Line": ["#2E0854", "#000022", "#FF0000"],
            "Wano Kuni": ["#4A0E2E", "#002200", "#FFD700"],
            "Enies Lobby": ["#0A0A44", "#000055", "#FF8C00"],
            "Skypiea": ["#000066", "#220044", "#DAA520"],
            "Fishman Island": ["#003300", "#004444", "#660066"],
            "Whole Cake Island": ["#660033", "#440044", "#FF1493"],
            "Marineford": ["#1A2A2A", "#000033", "#660000"],
            "Punk Hazard": ["#440000", "#004444", "#FF4500"],
            "Dressrosa": ["#440000", "#220044", "#FF8C00"],
            "Thriller Bark": ["#1a0033", "#0d001a", "#4B0082"],
            "Impel Down": ["#330000", "#220000", "#990000"],
            "Zou": ["#1B2F1B", "#2F1B12", "#4B4B00"],
            "Alabasta": ["#443300", "#442200", "#CC9900"],
            "Loguetown": ["#0A1116", "#141D26", "#440000"],
            "Reverse Mountain": ["#440000", "#000044", "#660000"],
            "Water 7": ["#000044", "#002D4E", "#1E3F66"],
            "Sabaody": ["#002211", "#003322", "#004444"],
            "Raileygh": ["#220500", "#05001a", "#B8860B"], // Mahogany Sky, Indigo Ocean, Gold Energy
            "Rainbow Mist": ["#440000", "#003300", "#000044"]
        };

        function getColors() {
            if (profile === "Custom") return [color1, color2, color3];
            return profiles[profile] || profiles["Grand Line"];
        }

        function hexToRgba(hex, alpha, darkenAmt = 0) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            r = Math.max(0, r - darkenAmt);
            g = Math.max(0, g - darkenAmt);
            b = Math.max(0, b - darkenAmt);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        class Island {
            constructor(x) {
                this.x = x;
                this.type = Math.floor(Math.random() * 3);
                this.scale = 0.5 + Math.random() * 0.8;
                this.speedMult = 0.2 + Math.random() * 0.2;
            }
            update(globalSpeed) {
                this.x -= (globalSpeed / 100) * this.speedMult;
                if (this.x < -150) {
                    this.x = W + 150;
                    this.type = Math.floor(Math.random() * 3);
                    this.scale = 0.5 + Math.random() * 0.8;
                }
            }
            draw(ctx, colors, seaLevel) {
                ctx.save();
                ctx.translate(this.x, seaLevel + 5);
                ctx.scale(this.scale, this.scale);

                ctx.fillStyle = hexToRgba(colors[0], 1.0, 150);

                if (this.type === 0) {
                    ctx.beginPath();
                    ctx.moveTo(-70, 0);
                    ctx.lineTo(-45, -55);
                    ctx.lineTo(-20, -25);
                    ctx.lineTo(5, -85);
                    ctx.lineTo(25, -35);
                    ctx.lineTo(50, -65);
                    ctx.lineTo(75, 0);
                    ctx.fill();
                } else if (this.type === 1) {
                    ctx.beginPath();
                    ctx.moveTo(-80, 0);
                    ctx.quadraticCurveTo(-35, -30, -25, -75);
                    ctx.lineTo(25, -75);
                    ctx.quadraticCurveTo(35, -30, 80, 0);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(0, -95, 12, 0, Math.PI * 2);
                    ctx.arc(-15, -105, 9, 0, Math.PI * 2);
                    ctx.arc(12, -100, 8, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(-45, 0);
                    ctx.quadraticCurveTo(0, -15, 45, 0);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(-5, -5);
                    ctx.quadraticCurveTo(15, -40, 40, -80);
                    ctx.lineTo(28, -83);
                    ctx.quadraticCurveTo(5, -40, -15, -5);
                    ctx.fill();

                    ctx.save();
                    ctx.translate(35, -80);
                    for (let l = 0; l < 5; l++) {
                        ctx.rotate(Math.PI * 2 / 5);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(20, -20, 45, 10);
                        ctx.quadraticCurveTo(20, 10, 0, 0);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                ctx.restore();
            }
        }

        class Ship {
            constructor(x) {
                this.x = x;
                this.scale = 0.3 + Math.random() * 0.4;
                this.speedMult = 0.6 + Math.random() * 0.3;
                this.swayOffset = Math.random() * Math.PI * 2;
            }
            update(globalSpeed) {
                this.x -= (globalSpeed / 60) * this.speedMult;
                if (this.x < -100) {
                    this.x = W + 100;
                    this.scale = 0.3 + Math.random() * 0.4;
                    this.speedMult = 0.6 + Math.random() * 0.3;
                }
            }
            draw(ctx, localWaveY, colors) {
                ctx.save();
                let sway = Math.sin(time * 2 + this.swayOffset) * 0.1;

                ctx.translate(this.x, localWaveY);
                ctx.rotate(sway);
                ctx.scale(this.scale, this.scale);

                ctx.fillStyle = "#111111";

                ctx.beginPath();
                ctx.moveTo(-30, -10);
                ctx.lineTo(30, -10);
                ctx.lineTo(20, 10);
                ctx.lineTo(-20, 10);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(-30, -10);
                ctx.lineTo(-45, -25);
                ctx.lineWidth = 2;
                ctx.strokeStyle = ctx.fillStyle;
                ctx.stroke();

                const drawMast = (mx, my, h) => {
                    ctx.fillRect(mx - 1, my - h, 2, h);
                    ctx.beginPath();
                    ctx.moveTo(mx + 2, my - h + 5);
                    ctx.quadraticCurveTo(mx + 20, my - h + (h / 2), mx + 2, my - 5);
                    ctx.fill();
                };

                drawMast(-10, -10, 40);
                drawMast(15, -10, 30);

                ctx.fillRect(-10, -50, 10, 6);
                ctx.restore();
            }
        }

        class Cloud {
            constructor() {
                this.reset(true);
            }
            reset(randomX = false) {
                this.scale = 0.4 + Math.random() * 1.2;
                this.speedMult = this.scale * (0.5 + Math.random() * 0.5);
                this.opacity = 0.05 + (this.scale * 0.1);

                this.x = randomX ? Math.random() * (W + 200) - 50 : W + 50 + Math.random() * 100;
                this.y = 5 + Math.random() * (H / 2.2);

                this.puffs = [];
                let numPuffs = 4 + Math.floor(Math.random() * 5);
                let currentX = 0;

                for (let i = 0; i < numPuffs; i++) {
                    this.puffs.push({
                        ox: currentX,
                        oy: (Math.random() - 0.5) * 15,
                        r: 10 + Math.random() * 18
                    });
                    currentX += 10 + Math.random() * 15;
                }
            }
            update(globalSpeed) {
                this.x -= (globalSpeed / 30) * this.speedMult;
                if (this.x < -150) this.reset();
            }
            draw(ctx) {
                // Keep clouds subtle but tinted with the sky color instead of pure white
                ctx.fillStyle = `rgba(150, 150, 150, ${this.opacity})`;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                ctx.beginPath();
                for (let puff of this.puffs) {
                    ctx.moveTo(puff.ox, puff.oy);
                    ctx.arc(puff.ox, puff.oy, puff.r, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        class Lightning {
            constructor() {
                this.segments = [];
                this.x = Math.random() * W;
                this.y = 0;
                this.life = 1.0;
                this.generate();
            }
            generate() {
                let curX = this.x;
                let curY = this.y;
                for (let i = 0; i < 8; i++) {
                    let nextX = curX + (Math.random() - 0.5) * 50;
                    let nextY = curY + (Math.random() * 25);
                    this.segments.push({ x1: curX, y1: curY, x2: nextX, y2: nextY });
                    curX = nextX;
                    curY = nextY;
                }
            }
            draw(colors) {
                ctx.save();

                // Color lightning using the 3rd color in the profile instead of pure white
                let coreColor = color4

                ctx.strokeStyle = coreColor;
                ctx.shadowColor = coreColor;
                ctx.shadowBlur = 15;
                ctx.lineWidth = 6;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";

                ctx.beginPath();
                this.segments.forEach(s => {
                    ctx.moveTo(s.x1, s.y1);
                    ctx.lineTo(s.x2, s.y2);
                });
                ctx.stroke();

                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
                this.life -= 0.08;
            }
        }

        class FloatingItem {
            constructor() {
                this.reset();
                this.x = Math.random() * W;
                this.y = Math.random() * H - 50;
            }
            reset() {
                this.x = W + 20 + Math.random() * 300;
                this.y = -50 - Math.random() * 200;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = Math.random() * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.3;
                this.scale = 0.5 + Math.random() * 1.2;

                const types = ['hat', 'bone', 'meat', 'coin', 'anchor'];
                this.type = types[Math.floor(Math.random() * types.length)];
            }
            update(bass, localWaveY) {
                if (this.y < localWaveY) {
                    this.vx += (speed / 1500) * (Math.random() > 0.5 ? 1 : -0.5);
                    this.vy += 0.15;
                    this.rotation += this.rotSpeed * (1 + bass * 0.5);
                    this.vx *= 0.99;
                } else {
                    let depth = this.y - localWaveY;
                    this.vy -= depth * 0.08;
                    this.vy *= 0.82;
                    this.vx *= 0.90;
                    this.rotSpeed *= 0.90;
                    this.rotation += this.rotSpeed;
                    this.vx -= (speed / 300);

                    if (bass > 0.4) {
                        this.vy -= bass * 1.5;
                        this.rotSpeed += (Math.random() - 0.5) * 0.1;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -100 || this.x > W + 400 || this.y > H + 50) {
                    this.reset();
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);

                // Replaced pure whites and extremely light colors with slightly deeper/darker variants
                if (this.type === 'hat') {
                    const r = 12;
                    ctx.fillStyle = "#B87333"; ctx.strokeStyle = "#8B4513"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.ellipse(0, 3, r * 1.5, r * 0.4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 3, r * 0.75, Math.PI, 0); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#8B0000"; ctx.fillRect(-r * 0.75, -1, r * 1.5, 4);
                } else if (this.type === 'bone') {
                    ctx.fillStyle = "#A9A9A9"; ctx.strokeStyle = "#696969"; ctx.lineWidth = 1;
                    ctx.fillRect(-10, -2, 20, 4); ctx.strokeRect(-10, -2, 20, 4);
                    ctx.beginPath(); ctx.arc(-10, -3, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(-10, 3, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(10, -3, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(10, 3, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                } else if (this.type === 'meat') {
                    ctx.fillStyle = "#A9A9A9"; ctx.fillRect(-12, -2, 24, 4);
                    ctx.beginPath(); ctx.arc(-12, -3, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-12, 3, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(12, -3, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(12, 3, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#8B0000"; ctx.strokeStyle = "#4A0404";
                    ctx.beginPath(); ctx.ellipse(0, 0, 10, 8, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#4A0404"; ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
                } else if (this.type === 'coin') {
                    ctx.fillStyle = "#DAA520"; ctx.strokeStyle = "#8B6508"; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#8B6508"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText("B", 0, 1); ctx.fillRect(-2, -5, 1, 10);
                } else if (this.type === 'anchor') {
                    ctx.strokeStyle = "#4F4F4F"; ctx.fillStyle = "#696969"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 12); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 6, 8, 0, Math.PI, false); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, -10, 3, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.restore();
            }
        }

        // Initialize Entities
        for (let i = 0; i < 12; i++) clouds.push(new Cloud());
        for (let i = 0; i < 3; i++) islands.push(new Island(i * 150 + Math.random() * 50));
        for (let i = 0; i < 2; i++) ships.push(new Ship(W + Math.random() * 200));

        function drawWaveLayer(ctx, baseSeaLevel, color, speedDiv, ampDiv, freq, bassAmp, foamColor = null) {
            const sailing = time * (speed / speedDiv);
            const waveAmp = (wave_intensity / ampDiv) * (1 + bassAmp);

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, H);
            ctx.lineTo(0, baseSeaLevel);

            for (let x = 0; x <= W; x += 4) {
                let y = baseSeaLevel + Math.sin(x * freq + sailing) * waveAmp;
                y += Math.cos(x * (freq * 2) - sailing * 0.7) * (waveAmp * 0.4);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(W, H);
            ctx.fill();

            if (foamColor) {
                ctx.strokeStyle = foamColor;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function getWaveYAtX(x, baseSeaLevel, speedDiv, ampDiv, freq, bassAmp) {
            const sailing = time * (speed / speedDiv);
            const waveAmp = (wave_intensity / ampDiv) * (1 + bassAmp);
            let y = baseSeaLevel + Math.sin(x * freq + sailing) * waveAmp;
            y += Math.cos(x * (freq * 2) - sailing * 0.7) * (waveAmp * 0.4);
            return y;
        }

        function update() {
            const colors = getColors();
            let bass = 0;
            if (window.engine && engine.audio.freq) {
                bass = (engine.audio.freq[0] + engine.audio.freq[1] + engine.audio.freq[2]) / (3 * 255);
            }

            if (isNaN(bass) || bass < 0) {
                bass = 0;
            }

            const targetItemCount = typeof item_count !== 'undefined' ? item_count : 15;
            while (floatingItems.length < targetItemCount) floatingItems.push(new FloatingItem());
            while (floatingItems.length > targetItemCount) floatingItems.pop();

            if (show_haki && bass > (1.1 - haki_sensitivity / 100)) {
                if (Math.random() > 0.88) lightning.push(new Lightning());
            }

            // 1. Draw Sky
            let skyGrad = ctx.createLinearGradient(0, 0, 0, H);
            skyGrad.addColorStop(0, colors[0]);
            skyGrad.addColorStop(0.7, colors[2] + "66");
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // 2. Draw Clouds
            clouds.forEach(cloud => { cloud.update(speed); cloud.draw(ctx); });

            // 3. New Emblem Vector (Replaces Shockwave)
            if (show_logo) {
                ctx.save();

                // Set color to Energy Color (color3) with audio-reactive opacity
                let energyColor = hexToRgba("#ffffff", 0.7);
                ctx.fillStyle = energyColor; // Changed to fillStyle
                ctx.shadowColor = energyColor;

            const fixedHorizon = H / 1.5;
            const globalSeaLevel = fixedHorizon - (bass * 40);

            const waveLayers = {
                bg: { level: globalSeaLevel - 10, speedDiv: 30, ampDiv: 12, freq: 0.015, color: hexToRgba(colors[1], 1.0, 40) },
                mid: { level: globalSeaLevel, speedDiv: 15, ampDiv: 8, freq: 0.025, color: hexToRgba(colors[1], 1.0, 0) },
                fg: { level: globalSeaLevel + 25, speedDiv: 8, ampDiv: 5, freq: 0.035, color: hexToRgba(colors[1], 1.0, -20) }
            };

            // 4. Distant Islands
            islands.forEach(island => {
                island.update(speed);
                island.draw(ctx, colors, fixedHorizon - 10);
            });

            // 5. Background Waves
            drawWaveLayer(ctx, waveLayers.bg.level, waveLayers.bg.color, waveLayers.bg.speedDiv, waveLayers.bg.ampDiv, waveLayers.bg.freq, bass * 0.2);

            // 6. Pirate Ships
            ships.forEach(ship => {
                ship.update(speed);
                ship.draw(ctx, fixedHorizon - 10, colors);
            });

            // 7. Midground Waves - Replaced white foam with dark profile color
            let midFoam = hexToRgba(colors[0], 0.3);
            drawWaveLayer(ctx, waveLayers.mid.level, waveLayers.mid.color, waveLayers.mid.speedDiv, waveLayers.mid.ampDiv, waveLayers.mid.freq, bass * 0.5, midFoam);

            // 8. Floating Items
            floatingItems.forEach(item => {
                let localWaveY = getWaveYAtX(item.x, waveLayers.mid.level, waveLayers.mid.speedDiv, waveLayers.mid.ampDiv, waveLayers.mid.freq, bass * 0.5);
                item.update(bass, localWaveY);
                item.draw(ctx);
            });

            // 9. Foreground Waves - Replaced white foam with dark profile color
            let fgFoam = hexToRgba(colors[0], 0.5);
            drawWaveLayer(ctx, waveLayers.fg.level, waveLayers.fg.color, waveLayers.fg.speedDiv, waveLayers.fg.ampDiv, waveLayers.fg.freq, bass * 0.8, fgFoam);

            // 10. Lightning
            for (let i = lightning.length - 1; i >= 0; i--) {
                lightning[i].draw(colors);
                if (lightning[i].life <= 0) lightning.splice(i, 1);
            }

            time += 0.05;
            requestAnimationFrame(update);
        }

        update();
