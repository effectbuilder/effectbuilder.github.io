<!DOCTYPE html>
<html>
<head>
    <title>Bioluminescent Deep</title>
    <meta title="Bioluminescent Deep">
    <meta description="Organic fluid simulation with 21 multi-color profiles, including a full Rainbow mode and audio-reactive white energy flares." />
    <meta publisher="José Miranda" />

    <meta property="colorProfile" label="Color Profile" type="combobox" values="Custom,Rainbow,Abyss,Amethyst,Arctic,Borealis,Coral,Crimson,Deep Sea,Electric,Galaxy,Gold,Jungle,Magma,Midnight,Neon,Phantom,Prism,Sunset,Toxic Glow,Tropical,Volcanic" default="Custom">
    
    <meta property="customColor1" label="Custom Spore Color 1" type="color" default="#00ffff">
    <meta property="customColor2" label="Custom Spore Color 2" type="color" default="#0055ff">
    <meta property="customBG" label="Custom Background" type="color" default="#000000">

    <meta property="swellScale" label="Spore Density" type="number" default="85" min="10" max="250" tooltip="Size of the organic clusters.">
    <meta property="fluidSpeed" label="Current Speed" type="number" default="5" min="1" max="100" tooltip="How fast the water flows.">
    <meta property="agitation" label="Glow Threshold" type="number" default="100" min="20" max="120" tooltip="Sparsity of the spores.">
    <meta property="audioImpact" label="Audio Agitation" type="number" default="17" min="0" max="100">
    <meta property="whiteFlare" label="Bass White Flash" type="number" default="120" min="0" max="255" tooltip="Intensity of the pure white core on beats.">

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: pixelated; }
    </style>
</head>

<body>
    <canvas id="effect-canvas" width="320" height="200"></canvas>

    <script>
        // -------------------------------------------------------------------
        // BROWSER COMPATIBILITY LAYER & AUDIO SIM
        // -------------------------------------------------------------------
        if (typeof window.engine === 'undefined') {
            const metaTags = document.querySelectorAll('meta[property]');
            metaTags.forEach(meta => {
                const propName = meta.getAttribute('property');
                const propType = meta.getAttribute('type');
                const defaultVal = meta.getAttribute('default');
                if (propName) {
                    let finalValue = defaultVal;
                    if (propType === 'number') finalValue = parseFloat(defaultVal);
                    else if (propType === 'boolean') finalValue = (defaultVal === 'true' || defaultVal === '1');
                    window[propName] = finalValue;
                }
            });
            window.engine = { audio: { freq: new Array(128).fill(0) } };
            function simulateAudio() {
                const time = Date.now() / 1000; 
                const dataArray = new Array(128).fill(0);
                const beat = (Math.sin(time * Math.PI * 3) + 1) / 2; 
                dataArray[0] = Math.pow(beat, 8) * 255; 
                window.engine.audio.freq = dataArray;
                requestAnimationFrame(simulateAudio);
            }
            simulateAudio();
        }
    </script>

    <script>
        const canvas = document.getElementById('effect-canvas');
        const ctx = canvas.getContext('2d');
        const width = 320;
        const height = 200;

        const profiles = {
            "Abyss": ["#111111", "#4444ff", "#000000"],
            "Amethyst": ["#9900ff", "#ffffff", "#05000a"],
            "Arctic": ["#ffffff", "#77ccff", "#050510"],
            "Borealis": ["#00ff44", "#aa00ff", "#00050a"],
            "Coral": ["#ff5588", "#ffcc00", "#0a0505"],
            "Crimson": ["#ff0000", "#550000", "#000000"],
            "Deep Sea": ["#00ffff", "#0055ff", "#000000"],
            "Electric": ["#0099ff", "#ffffff", "#000000"],
            "Galaxy": ["#ff00cc", "#4400ff", "#020005"],
            "Gold": ["#ffff00", "#ffaa00", "#0a0a00"],
            "Jungle": ["#33ff33", "#884400", "#000500"],
            "Magma": ["#ffaa00", "#ff0000", "#100000"],
            "Midnight": ["#3333ff", "#ff00ff", "#000000"],
            "Neon": ["#00ff00", "#ff00ff", "#000000"],
            "Phantom": ["#00ffcc", "#333333", "#000505"],
            "Prism": ["#ff0000", "#00ff00", "#0000ff"],
            "Sunset": ["#ffcc33", "#ff3366", "#0a0005"],
            "Toxic Glow": ["#ccff00", "#00ff00", "#050a00"],
            "Tropical": ["#00ffaa", "#ffff00", "#000505"],
            "Volcanic": ["#ff3300", "#ffaa00", "#0a0000"]
        };

        const hexToRgb = (hex) => {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        };

        const grad = new Float32Array(256);
        for(let i=0; i<256; i++) grad[i] = Math.random();

        const noise = (x, y) => {
            const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
            const xf = x - Math.floor(x), yf = y - Math.floor(y);
            const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
            const n00 = grad[(X + grad[Y] * 256) & 255];
            const n01 = grad[(X + grad[(Y + 1) & 255] * 256) & 255];
            const n10 = grad[(X + 1 + grad[Y] * 256) & 255];
            const n11 = grad[(X + 1 + grad[(Y + 1) & 255] * 256) & 255];
            return n00 + u*(n10-n00) + v*(n01-n00) + u*v*(n00-n10-n01+n11);
        };

        let time = 0;

        function render() {
            let bass = 0;
            if (window.engine?.audio?.freq) bass = window.engine.audio.freq[0] / 255;

            const speed = (window.fluidSpeed || 5) / 1000;
            const scale = (window.swellScale || 85) / 60; 
            const threshold = (121 - (window.agitation || 0)) / 100;
            const audioSens = (window.audioImpact || 0) / 100;
            const flare = (window.whiteFlare || 80) / 255;

            const profileName = window.colorProfile || "Custom";
            let c1, c2, bg;

            if (profileName === "Custom") {
                c1 = hexToRgb(window.customColor1 || "#00ffff");
                c2 = hexToRgb(window.customColor2 || "#0055ff");
                bg = hexToRgb(window.customBG || "#000000");
            } else if (profileName !== "Rainbow") {
                const colors = profiles[profileName];
                c1 = hexToRgb(colors[0]); c2 = hexToRgb(colors[1]); bg = hexToRgb(colors[2] || "#000000");
            }

            time += speed;

            const imgData = ctx.createImageData(width, height);
            const data = imgData.data;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;

                    const qx = noise(x * 0.01 * scale + time, y * 0.01 * scale);
                    const qy = noise(x * 0.01 * scale, y * 0.01 * scale + time);

                    const nMain = noise((x * 0.04 * scale) + qx * 4, (y * 0.04 * scale) + qy * 4);
                    const nDetail = noise(x * 0.4 + time * 4, y * 0.4 - time * 2);
                    
                    let val = (nMain * 0.7) + (nDetail * 0.3);
                    let b = Math.max(0, val - threshold);
                    
                    b *= (1.0 + bass * audioSens * 25.0);
                    b = Math.pow(b, 5.0) * 12;

                    const wFlash = Math.pow(bass, 3.5) * b * flare * 3.5;

                    if (profileName === "Rainbow") {
                        const hue = (val * 360 + time * 50) % 360;
                        const s = 1, l = 0.5 * b;
                        const k = n => (n + hue / 30) % 12;
                        const a = s * Math.min(l, 1 - l);
                        const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
                        
                        data[idx]   = Math.min(255, f(0) * 255 + 255 * wFlash);
                        data[idx+1] = Math.min(255, f(8) * 255 + 255 * wFlash);
                        data[idx+2] = Math.min(255, f(4) * 255 + 255 * wFlash);
                    } else {
                        const mix = Math.sin(val * 8 + time) * 0.5 + 0.5;
                        data[idx]   = Math.min(255, bg[0] + (c1[0] * (1-mix) + c2[0] * mix) * b + 255 * wFlash);
                        data[idx+1] = Math.min(255, bg[1] + (c1[1] * (1-mix) + c2[1] * mix) * b + 255 * wFlash);
                        data[idx+2] = Math.min(255, bg[2] + (c1[2] * (1-mix) + c2[2] * mix) * b + 255 * wFlash);
                    }
                    data[idx+3] = 255;
                }
            }

            ctx.putImageData(imgData, 0, 0);
            requestAnimationFrame(render);
        }

        render();
    </script>
    <script type="application/json" class="effect-preset">
    {
    "name": "Mix: Color Profile = Crimson, Custom Spore Color 1 = #CEAA2F, Custom Spore Color 2 = #5CFB16 +6 more \ud83c\udfb2",
    "url": "https://go.signalrgb.com/app/effect/apply/Bioluminescent%20Deep/?colorProfile=Crimson&customColor1=%23ceaa2f&customColor2=%235cfb16&customBG=%23b398c7&swellScale=233&fluidSpeed=66&agitation=79&audioImpact=44&whiteFlare=86"
}
    </script>
    <script type="application/json" class="effect-preset">
    {
    "name": "Mix: Color Profile = Sunset, Custom Spore Color 1 = #6EF202, Custom Spore Color 2 = #426AF6 +6 more \ud83c\udfb2",
    "url": "https://go.signalrgb.com/app/effect/apply/Bioluminescent%20Deep/?colorProfile=Sunset&customColor1=%236ef202&customColor2=%23426af6&customBG=%23bb5ce0&swellScale=31&fluidSpeed=74&agitation=30&audioImpact=67&whiteFlare=62"
}
    </script>

</body>
</html>
