<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Junkie - SignalRGB Node Builder</title>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/litegraph.js/css/litegraph.css">
    <script src="https://cdn.jsdelivr.net/npm/litegraph.js/build/litegraph.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="presentation-container">
        <canvas id="retro-canvas" width="320" height="200"></canvas>
        <div class="control-bar">
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleDevMode()" title="Show/Hide Node Editor">⚙️ Editor</button>
                <button onclick="window.triggerImport()" style="border-color: #f1c40f; color: #f1c40f;">📂 Load Project</button>
                <button onclick="window.exportProjectFile()" style="border-color: #2ecc71; color: #2ecc71;" title="Save Nodes to JSON">💾 Save Project</button>

                <select id="fps-select" onchange="window.previewFPS = parseInt(this.value); window.compileGraph();" style="background: #2a2a2a; color: #888; border: 1px solid #444; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; outline: none;">
                    <option value="30">30 FPS (SignalRGB Default)</option>
                    <option value="60">60 FPS (SignalRGB Max)</option>
                </select>
            </div>

            <button class="btn-download" onclick="downloadSignalRGB()">⬇️ Download SignalRGB Effect</button>
        </div>
    </div>
    <input type="file" id="import-input" style="display:none;" onchange="window.importProjectFile(event)">

    <div id="editor-container">
        <canvas id="node-canvas" width="1024" height="768"></canvas>
    </div>

    <script src="engine_setup.js"></script>

    <script src="nodes/BgTrails.js"></script>
    <script src="nodes/StartSpawner.js"></script>
    <script src="nodes/ShapePicker.js"></script>
    <script src="nodes/SineWave.js"></script>
    <script src="nodes/AudioLevelSize.js"></script>
    <script src="nodes/MovementBouncing.js"></script>
    <script src="nodes/HardwareGradient.js"></script>
    <script src="nodes/DrawToScreen.js"></script>
    <script src="nodes/ColorCycler.js"></script>
    <script src="nodes/Rotation.js"></script>


    <script src="compiler.js"></script>
    <script src="app.js"></script>

</body>

</html>
