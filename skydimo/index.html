<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skydimo Effect Builder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Skydimo LUA Builder</h1>
        </header>

        <div class="main-content">
            <aside class="controls">
                <div class="control-group">
                    <label for="preset-name">Preset Name</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="preset-name" placeholder="My Cool Effect" style="flex-grow: 1; background: #1a1a1a; color: white; border: 1px solid #444; padding: 5px; border-radius: 4px;">
                        <button id="save-preset-btn" style="background: #00ffcc; color: #121212; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">Save</button>
                    </div>
                    <div id="presets-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
                    </div>
                </div>

                <div class="control-group">
                    <label for="effect-type">Effect Type</label>
                    <select id="effect-type">
                        <optgroup label="Solid & Basic">
                            <option value="solid">Solid Color</option>
                            <option value="rainbow">Rainbow</option>
                        </optgroup>
                        
                        <optgroup label="1D Wave & Motion">
                            <option value="wave">Wave</option>
                            <option value="scanner">Scanner</option>
                            <option value="sweep">Sweep</option>
                            <option value="breathing">Breathing</option>
                            <option value="strobe">Strobe</option>
                            <option value="comet">Comet</option>
                            <option value="sine_pulse">Sine Pulse</option>
                            <option value="bounce_sine">Bounce Sine</option>
                            <option value="fire">Fire</option>
                            <option value="sparkle">Sparkle</option>
                            <option value="theater">Theater Chase</option>
                            <option value="police">Police Lights</option>
                            <option value="glitch">Glitch</option>
                        </optgroup>

                        <optgroup label="2D Patterns & Grids">
                            <option value="matrix_rain">Matrix Rain</option>
                            <option value="grid_scan">Grid Scan</option>
                            <option value="v_sweep">Vertical Sweep</option>
                            <option value="radial_pulse">Radial Pulse</option>
                            <option value="diagonal_wave">Diagonal Wave</option>
                            <option value="aurora">Aurora</option>
                            <option value="plasma">Plasma</option>
                            <option value="heartbeat">Heartbeat</option>
                            <option value="helix">Helix</option>
                            <option value="dual_sine">Dual Sine</option>
                            <option value="ripple">Ripple</option>
                            <option value="radar">Radar Sweep</option>
                            <option value="waterfall">Waterfall</option>
                            <option value="vortex">Vortex</option>
                            <option value="kaleidoscope">Kaleidoscope</option>
                        </optgroup>
                    </select>
                </div>

                <div class="control-group">
                    <label for="brightness">Brightness (<span id="brightness-num">100</span>%)</label>
                    <input type="range" id="brightness" min="0" max="100" value="100">
                </div>

                <div class="control-group">
                    <label for="speed">Speed (<span id="speed-num">1000</span>)</label>
                    <input type="range" id="speed" min="0" max="2000" value="1000">
                </div>

                <div class="control-group">
                    <label for="color">Primary Color</label>
                    <input type="color" id="color" value="#0000ff">
                </div>

                <div class="control-group">
                    <label for="color2">Secondary Color</label>
                    <input type="color" id="color2" value="#ff0000">
                </div>

                <div class="control-group">
                    <button id="reset-btn" style="background-color: #333; color: #ff5555; border: 1px solid #ff5555; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                        Reset to Defaults
                    </button>
                </div>
            </aside>

            <section class="output-section">
                <div class="preview-container">
                    <label>Live Preview</label>
                    <canvas id="preview-canvas" width="800" height="300"></canvas>
                </div>

                <div class="output-header">
                    <label for="lua-output">Generated Output</label>
                    <button id="copy-btn">Copy to Clipboard</button>
                </div>
                <textarea id="lua-output" readonly></textarea>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
