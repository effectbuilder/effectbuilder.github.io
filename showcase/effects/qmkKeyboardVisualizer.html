    // --- COLOR HELPERS ---
    function hexToRgb(hex) {
        var shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
        hex = hex.replace(shorthandRegex, function (m, r, g, b) {
            return r + r + g + g + b + b;
        });
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 0, g: 0, b: 0 };
    }

    function lerp(start, end, t) {
        return start * (1 - t) + end * t;
    }

    function lerpColor(c1, c2, t) {
        const rgb1 = hexToRgb(c1);
        const rgb2 = hexToRgb(c2);
        const r = Math.round(lerp(rgb1.r, rgb2.r, t));
        const g = Math.round(lerp(rgb1.g, rgb2.g, t));
        const b = Math.round(lerp(rgb1.b, rgb2.b, t));
        return `rgb(${r},${g},${b})`;
    }

    function getColorFromPalette(t) {
        const val = Math.max(0, Math.min(1, t));

        if (colorPalette === "Custom") {
            return lerpColor(customCol1, customCol2, val);
        }
        else if (colorPalette === "Rainbow") {
            const hue = (1.0 - val) * 240;
            return `hsl(${hue}, 100%, 50%)`;
        }
        else if (PALETTES[colorPalette]) {
            const p = PALETTES[colorPalette];

            // --- Multi-Stop Gradient Logic ---
            if (p.length === 2) {
                // Standard two-color LERP
                return lerpColor(p[0], p[1], val);
            } else if (p.length > 2) {
                // Piecewise LERP for multi-color stops
                const numSegments = p.length - 1;
                const segmentWidth = 1 / numSegments;

                // Determine which segment the value falls into
                let segmentIndex = Math.floor(val / segmentWidth);
                segmentIndex = Math.min(segmentIndex, numSegments - 1); // Clamp max index

                // Calculate local progress (0 to 1) within that segment
                const segmentStart = segmentIndex * segmentWidth;
                const localT = (val - segmentStart) / segmentWidth;

                // Interpolate between the start and end color of the segment
                return lerpColor(p[segmentIndex], p[segmentIndex + 1], localT);
            }
        }
        return "#FFFFFF";
    }

    // --- EFFECTS CLASSES ---

    // Base Flash (Square, fades over key)
    function Flash(x, y, w, h, id, colorT = 1.0, lifetime = 100) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.id = id; this.lifetime = lifetime;
        this.fixedColorT = colorT;
        this.type = 'Flash';
    }
    Flash.prototype.update = function () { this.lifetime -= (fadeSpeed * 1.5); };

    // Explode Flash (Square, grows smoothly before fading, FIXED POSITION)
    function ExplodeFlash(x, y, w, h, id, colorT = 1.0) {
        Flash.call(this, x, y, w, h, id, colorT, 100);
        this.initialX = x; // New: Store original fixed X
        this.initialY = y; // New: Store original fixed Y
        this.initialW = w;
        this.initialH = h;
        this.maxSizeFactor = 1.8;
        this.type = 'ExplodeFlash';
        this.time = 0;
    }
    ExplodeFlash.prototype = Object.create(Flash.prototype);
    ExplodeFlash.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.5);
        this.time += (fadeSpeed * 1.5);

        // Calculate the size only. Do NOT update this.x or this.y.
        const progress = (100 - this.lifetime) / 100;
        const scaleFactor = 1.5 * (1.0 + Math.sin(progress * Math.PI) * (this.maxSizeFactor - 1.0));

        // Update width/height properties only.
        this.w = this.initialW * scaleFactor;
        this.h = this.initialH * scaleFactor;
    };

    // Spiral Flash (FINAL FIX: Total Rotations controlled by effectScale, independent of fadeSpeed)
    function SpiralFlash(x, y, w, h, id, colorT = 1.0) {
        Flash.call(this, x, y, w, h, id, colorT, 100);
        this.cX = x + w / 2;
        this.cY = y + h / 2;
        this.initialW = w;
        this.initialH = h;
        this.distance = 0;

        // 1. Store the random starting angle (Fixed once)
        this.startAngle = Math.random() * 2 * Math.PI;

        // Angle used for drawing, initialized to startAngle
        this.orbitAngle = this.startAngle;

        // Store the max distance based on effectScale (Scale is only size now)
        this.maxDistance = w * 0.5 * normalizedScale;

        // Store the speed factor for rotation
        this.rotationSpeedFactor = (fadeSpeed / 10); // Base speed derived from "Anim Speed"

        this.type = 'SpiralFlash';
    }
    SpiralFlash.prototype = Object.create(Flash.prototype);
    SpiralFlash.prototype.update = function () {
        // We divide the fade factor by 10 to drastically slow down the counter reduction.
        this.lifetime -= (fadeSpeed * 0.15);

        // Normalized progress from 0 (start) to 1 (end) for distance scaling
        const progress = (100 - this.lifetime) / 100;

        // 1. SPIRAL DISTANCE: Only depends on initial size and scale setting
        this.distance = progress * this.maxDistance;

        // 2. ROTATION: Depends on rotationSpeedFactor (derived from fadeSpeed)
        this.orbitAngle += this.rotationSpeedFactor * 0.1;

        // Note: The object is removed when this.lifetime drops to 0, which now takes much longer.
    };

    // Global Ripple/Shockwave
    function GlobalRipple(x, y, colorT = 1.0) {
        this.x = x; this.y = y;
        this.radius = 1;
        this.alpha = 1.0;
        this.fixedColorT = colorT;
        this.type = 'GlobalRipple';
    }
    GlobalRipple.prototype.update = function () {
        this.radius += (fadeSpeed * 1.5);
    };

    // REVISED: Ripple (A clean expanding ring localized to a key)
    function KeyRipple(x, y, keyW, colorT = 1.0) {
        this.x = x; this.y = y;
        this.radius = 1;
        this.alpha = 1.0;
        this.fixedColorT = colorT;
        this.type = 'KeyRipple';
        this.maxRadius = keyW * 1.5; // Larger radius based on key size
    }
    KeyRipple.prototype.update = function () {
        this.radius += (fadeSpeed * 3 * normalizedScale); // Faster expansion
        if (this.radius > this.maxRadius) {
            this.alpha -= (fadeSpeed * 0.05);
        } else {
            this.alpha = 1.0;
        }
    };

    // Knight Rider Bar (Full-key rectangle animated sideways)
    function KnightBar(x, y, w, h, colorT = 1.0) {
        this.y = y;
        this.w = w;
        this.h = h;
        this.lifetime = 100;
        this.fixedColorT = colorT;
        this.type = 'KnightBar';

        const centerX = canvas.width * 0.3;
        const keyCenter = x + (w / 2);

        // Calculate how far the bar should travel (e.g., 3x the key width, scaled)
        const travelDistance = (w * 3) * normalizedScale;

        // Determine Start and End points based on side of screen
        if (keyCenter < centerX) {
            // LEFT SIDE KEY: Start at X, Move Right to X + Distance
            // Motion: Left -> Right -> Left
            this.startX = x;
            this.endX = x + travelDistance;
        } else {
            // RIGHT SIDE KEY: Start at X (plus width to align right edge), Move Left to X - Distance
            // Motion: Right -> Left -> Right
            // We adjust startX so the bar begins flush with the right side of the key area
            this.startX = x;
            this.endX = x - travelDistance;
        }

        // Initialize position
        this.x = this.startX;
    }

    KnightBar.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.5);

        // 1. Calculate standardized time factor (0.0 to 1.0 to 0.0)
        const normalizedTime = (100 - this.lifetime) * 2;
        const cycleProgress = (normalizedTime % 200) / 100;

        // Oscillator: Goes from 0 -> 1 -> 0
        const oscillation = (cycleProgress <= 1.0) ? cycleProgress : (2.0 - cycleProgress);

        // 2. Interpolate between Start and End based on oscillation
        // If Left Key: 0 (Start) -> 1 (End/Right) -> 0 (Start)
        // If Right Key: 0 (Start) -> 1 (End/Left) -> 0 (Start)
        this.x = this.startX + (this.endX - this.startX) * oscillation;
    };

    // REVISED: Star Emitter Particle (Larger size with strong dependence on effectScale)
    function StarParticle(x, y, keyW, colorT = 1.0) {
        this.x = x;
        this.y = y;
        // Base size is 5 pixels. This will be multiplied by normalizedScale (e.g., 5 * 3.0 = 15px at 300%)
        this.size = 5;
        this.alpha = 1.0;
        this.fixedColorT = colorT;
        this.lifetime = 60;
        this.type = 'StarParticle';

        const angle = Math.random() * 2 * Math.PI;
        const speed = Math.random() * 5 + 1;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
    }
    StarParticle.prototype.update = function () {
        this.lifetime -= (fadeSpeed / 2);
        this.alpha = this.lifetime / 60;
        this.x += this.vx * normalizedScale;
        this.y += this.vy * normalizedScale;
        this.vy += 0.1;
    };

    // Row Column Flash (Flashes row and column across the whole board)
    function RowColumnFlash(uX, uY, colorT = 1.0) {
        this.uX = uX; // Unit X position (column index)
        this.uY = uY; // Unit Y position (row index)
        this.lifetime = 100;
        this.fixedColorT = colorT;
        this.type = 'RowColumnFlash';
    }
    RowColumnFlash.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.5);
    };

    // Lightning Strike (Jagged line jumping to neighbors)
    function LightningStrike(startX, startY, keyW, colorT = 1.0) {
        this.x = startX; this.y = startY;
        this.keyW = keyW;
        this.fixedColorT = colorT;
        this.lifetime = 200; // Longer life to allow multiple jumps
        this.jumpsRemaining = 5;
        this.currentEnd = { x: startX, y: startY };
        this.alpha = 1.0;
        this.type = 'LightningStrike';

        // Randomly select a nearby target Key ID
        this.pickNewTarget = function (currentKey) {
            if (this.jumpsRemaining <= 0) return null;

            const neighbors = [];
            const buffer = 1.5;

            // Find keys within a small radius (e.g., 3 key units)
            for (const id in KEY_DB) {
                const key = KEY_DB[id];
                const dist = Math.sqrt(Math.pow(key.uX - currentKey.uX, 2) + Math.pow(key.uY - currentKey.uY, 2));
                if (dist > 0 && dist < buffer) {
                    neighbors.push(key);
                }
            }

            if (neighbors.length === 0) return null;

            // Pick a random neighbor
            return neighbors[Math.floor(Math.random() * neighbors.length)];
        };

        // Initial target is the starting key itself
        this.targetKey = KEY_DB[getNearestKeyId(startX, startY)];
        this.nextTarget = this.pickNewTarget(this.targetKey);
    }

    LightningStrike.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.5);
        this.alpha = this.lifetime / 200;

        if (this.alpha <= 0.5 && this.nextTarget && this.jumpsRemaining > 0) {
            // Jump to the next target
            this.jumpsRemaining--;
            this.targetKey = this.nextTarget;
            this.currentEnd = { x: this.nextTarget.cX, y: this.nextTarget.cY };

            this.nextTarget = this.pickNewTarget(this.targetKey);
            this.alpha = 1.0; // Restart alpha fade for visual "flash"
            this.lifetime = 100; // Reset lifetime to prolong effect
        }
    };

    // Helper function needed by LightningStrike constructor
    function getNearestKeyId(x, y) {
        let nearestId = null;
        let minDistanceSq = Infinity;
        for (const id in KEY_DB) {
            const key = KEY_DB[id];
            const distSq = Math.pow(key.cX - x, 2) + Math.pow(key.cY - y, 2);
            if (distSq < minDistanceSq) {
                minDistanceSq = distSq;
                nearestId = id;
            }
        }
        return nearestId;
    }

    // 1. Gravity Sparks
    function GravitySpark(x, y, colorT) {
        this.x = x; this.y = y;
        this.fixedColorT = colorT;
        this.lifetime = 100;
        this.size = (Math.random() * 4 + 2) * normalizedScale;
        // Explode outward and mostly upward
        let angle = (Math.random() * Math.PI) + Math.PI;
        let force = Math.random() * 15 + 5;
        this.vx = Math.cos(angle) * force * normalizedScale;
        this.vy = Math.sin(angle) * force * normalizedScale;
        this.gravity = 0.8 * normalizedScale;
        this.bounce = 0.6; // Energy retained on floor hit
    }
    GravitySpark.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.5);
        this.vy += this.gravity; // Apply gravity
        this.x += this.vx;
        this.y += this.vy;

        // Bounce off the bottom of the canvas
        if (this.y >= canvas.height - this.size) {
            this.y = canvas.height - this.size;
            this.vy *= -this.bounce;
            this.vx *= 0.8; // Friction
        }
    }

    // 2. Space-Time Punch (Gravity Well)
    function GravityWell(x, y, w, colorT) {
        this.x = x; this.y = y;
        this.w = w;
        this.fixedColorT = colorT;
        this.lifetime = 100;
        this.maxForce = (w * 5) * normalizedScale;
    }
    GravityWell.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 2.5);
    }

    // 1. Neural Tracers (Right-Angle Walkers)
    function NeuralTracer(x, y, colorT) {
        this.x = x; this.y = y;
        this.fixedColorT = colorT;
        this.lifetime = 100;
        this.history = [{ x: this.x, y: this.y }];
        this.speed = (Math.random() * 8 + 4) * normalizedScale;

        // Pick a random starting orthogonal direction
        const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
        let d = dirs[Math.floor(Math.random() * dirs.length)];
        this.vx = d[0] * this.speed;
        this.vy = d[1] * this.speed;
        this.type = 'NeuralTracer';
    }
    NeuralTracer.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 1.2);

        // 15% chance to randomly turn 90 degrees each frame
        if (Math.random() < 0.15) {
            let temp = this.vx;
            // Randomly flip signs to decide left or right turn
            let dirFlip = Math.random() > 0.5 ? 1 : -1;
            this.vx = dirFlip * this.vy;
            this.vy = dirFlip * temp;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Add to trail history
        this.history.push({ x: this.x, y: this.y });
        if (this.history.length > 15) this.history.shift(); // Keep trail length fixed
    }

    // 2. Quantum Constellation Node
    function QuantumNode(x, y, colorT) {
        this.x = x; this.y = y;
        this.fixedColorT = colorT;
        this.lifetime = 100;

        this.vx = (Math.random() - 0.5) * 2 * normalizedScale;
        this.vy = (Math.random() - 0.5) * 2 * normalizedScale;
    }
    QuantumNode.prototype.update = function () {
        this.lifetime -= (fadeSpeed * 0.8); // Fades slower to allow web connections
        this.x += this.vx;
        this.y += this.vy;
    }

    // --- NEW ELEGANT CLASSES ---

    function AuraBlossom(x, y, w, colorT) {

    // --- HELPERS ---
    function drawRoundedRect(x, y, w, h, r, color, alpha = 1.0, stroke = false) {
        if (w < 1 || h < 1) return;
        const radius = 0;

        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();

        if (stroke) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        } else {
            ctx.fillStyle = color;
            ctx.fill();
        }
        ctx.restore();
    }

    // --- FETCH & PARSE ---
    async function fetchAndParse(url) {
        if (!url) return;
        statusText = "Fetching Keyboard Data...";
        isError = false;
        KEY_DB = {};
        HIT_COUNTS = {};
        maxHits = 1;

        try {
            const response = await fetch(url + "?t=" + Date.now());
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();

            if (text.trim().startsWith("<")) throw new Error("Received HTML, not JS.");
            parseJS(text);
        } catch (e) {
            console.error(e);
            statusText = "Load Error: " + e.message;
            isError = true;
        }
    }

    function parseJS(text) {
        try {
            // 1. Clean exports so the code can run in a standard Function constructor
            let cleanCode = text.replace(/export\s+function/g, 'function')
                .replace(/export\s+const/g, 'const')
                .replace(/export\s+var/g, 'var')
                .replace(/export\s+let/g, 'let');

            // 2. Determine Layout (ANSI vs ISO) for Keychron logic
            const isISO = keyboardPreset.toLowerCase().includes("iso");
            const simulatedPID = isISO ? 0x0B61 : 0x0B60; 

            const runner = new Function(`
                // Create a robust fake device that matches what Q6 plugins expect
                const device = { 
                    log: function(){}, 
                    notify: function(){}, 
                    write: function(){}, 
                    read: function(){ return []; }, 
                    pause: function(){}, 
                    color: function(){ return [0,0,0]; }, 
                    getLastReadSize: function(){ return 0; },
                    productId: function(){ return ${simulatedPID}; },
                    setControllableLeds: function(names, pos){ 
                        // Capture arrays if the plugin uses this method instead of global vars
                        this._capturedNames = names;
                        this._capturedPos = pos;
                    }
                };

                // Define global variables the plugins expect to see
                const shutdownMode = "SignalRGB"; 
                const shutdownColor = "#000000"; 
                const LightingMode = "Canvas"; 
                const forcedColor = "#FFFFFF";

                ${cleanCode}

                // If the plugin has an Initialize function (like Q6), we MUST run it
                if (typeof Initialize === 'function') {
                    try { Initialize(); } catch(e) { console.warn("Initialize failed:", e); }
                }

                return {
                    pos: (typeof vKeyPositions !== 'undefined' && vKeyPositions.length > 0) ? vKeyPositions : (device._capturedPos || []),
                    names: (typeof vKeyNames !== 'undefined' && vKeyNames.length > 0) ? vKeyNames : (device._capturedNames || [])
                };
            `);

            const data = runner();
            
            if (!data.pos || data.pos.length === 0) {
                throw new Error("No coordinate data found in plugin.");
            }

            processLayout(data.pos, data.names);
            statusText = "";

        } catch (e) {
            console.error("Layout Parser Error:", e);
            statusText = "Parse Error: " + e.message;
            isError = true;
        }
    }

    function processLayout(rawCoords, names) {
        RAW_KEYS = [];
        rawCoords.forEach((pos, i) => {
            const uX = parseFloat(pos[0]);
            const uY = parseFloat(pos[1]);
            if (isNaN(uX) || isNaN(uY)) return;
            RAW_KEYS.push({
                uX: uX, uY: uY,
                name: names[i] || "Key",
                id: i,
                uW: 1, uH: 1
            });
        });
        buildGridDictionary(RAW_KEYS);
    }

    function buildGridDictionary(keys) {
        KEY_DB = {};
        if (keys.length === 0) return;

        let minX = Infinity, minY = Infinity;
        let maxX = -Infinity, maxY = -Infinity;

        keys.forEach(k => {
            if (k.uX < minX) minX = k.uX;
            if (k.uY < minY) minY = k.uY;
            if (k.uX + 1 > maxX) maxX = k.uX + 1;
            if (k.uY + 1 > maxY) maxY = k.uY + 1;
        });

        // --- NEW: Capture Global Unit Minimums ---
        minUX = minX;
        minUY = minY;

        const boardW = maxX - minX;
        const boardH = maxY - minY;

        // Use fixed canvas dimensions 320x200
        unitScaleX = canvas.width / boardW;
        unitScaleY = canvas.height / boardH;

        keys.forEach(k => {
            const uid = k.id.toString();

            // Calculate the precise pixel start and end points
            const startX_precise = (k.uX - minX) * unitScaleX;
            const endX_precise = startX_precise + unitScaleX;
            const startY_precise = (k.uY - minY) * unitScaleY;
            const endY_precise = startY_precise + unitScaleY;

            // Use Math.round to define the integer pixel bounds.
            // Start (x, y) is rounded down (floor) and End (endX, endY) is rounded (round)
            // to minimize overlap, ensuring a seamless visual grid.
            const x = Math.floor(startX_precise);
            const y = Math.floor(startY_precise);

            const w = Math.round(endX_precise) - x;
            const h = Math.round(endY_precise) - y;

            KEY_DB[uid] = {
                id: uid, name: k.name,
                x: x, y: y,
                w: w, h: h, // Integer width/height based on bounded rounding
                cX: Math.floor(x + w / 2),
                cY: Math.floor(y + h / 2),
                uX: k.uX,
                uY: k.uY
            };
        });
        console.log(`Grid Built. Scale: ${unitScaleX.toFixed(2)}, ${unitScaleY.toFixed(2)}`);
    }

    // --- INPUT HANDLER ---
    function onCanvasTapped(rawX, rawY) {
        const rect = canvas.getBoundingClientRect();
        const x = (rawX - rect.left) + (unitScaleX / 2);
        const y = (rawY - rect.top) + (unitScaleY / 2);

        if (drawDebug) touchDots.push({ x: x, y: y, color: "#FF0000" });

        const buffer = 1;

        for (const id in KEY_DB) {
            const key = KEY_DB[id];
            if (x >= key.x - buffer && x <= key.x + key.w + buffer &&
                y >= key.y - buffer && y <= key.y + key.h + buffer) {

                triggerKey(key);
                if (drawDebug) touchDots.push({ x: key.cX, y: key.cY, color: "#00FF00" });
                break;
            }
        }
    }

    // --- RENDER LOOP ---
    function draw() {
        // REMOVED: const g = 1;
        const g = 0;
        const radius = 0;

        let targetUrl = (keyboardPreset === "Custom URL") ? customUrl : PRESETS[keyboardPreset];
        if (targetUrl && targetUrl !== currentUrl) {
            currentUrl = targetUrl;
            fetchAndParse(currentUrl);
        }

        globalColorCycle = (performance.now() % cycleDuration) / cycleDuration;
        const cycleT = (colorMode === "Uniform Cycle") ? globalColorCycle : 1.0;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (statusText) {
            console.log(statusText)
            // ctx.fillStyle = isError ? '#ff4444' : '#ffffff';
            // ctx.font = '14px monospace';
            // ctx.textAlign = 'center';
            // ctx.fillText(statusText, canvas.width / 2, canvas.height / 2);
        }

        normalizedScale = (parseInt(effectScale) || 100) / 100.0;

        // --- GLOBAL SPOTLIGHT CALCULATION AND FADE (PROCESSED ONCE PER FRAME) ---
        let fadeAlpha = 1.0;
        if (effectType === "Spotlight Locator" && activeSpotlight) {
            const currentTime = performance.now();
            const elapsedTime = currentTime - activeSpotlight.startTime;

            // Calculate fade progress: 0.0 (start) to 1.0 (end)
            const progress = Math.min(1.0, elapsedTime / activeSpotlight.duration);

            fadeAlpha = 1.0 - progress; // The overall decay factor (1.0 -> 0.0)

            // Remove the spotlight when the duration is complete
            if (progress >= 1.0) {
                activeSpotlight = null;
            }
        }
        // --- END GLOBAL SPOTLIGHT CALCULATION ---

        // 6. Draw Base Layout & Key-Specific Effects (Heatmap, and Spotlight)
        for (const id in KEY_DB) {
            const key = KEY_DB[id];
            let keyColor = "#333333";
            let keyAlpha = 1.0;
            let drawEffectBackground = false;

            // 6a. Draw debug outline/base layer. This happens FIRST.
            if (drawDebug) {
                // Draw the dark base (the "test layout" background) when debug is active.
                drawRoundedRect(key.x, key.y, key.w, key.h, radius, "#333333", 1.0);
            }

            // 6b. Determine color and alpha based on effect
            if (effectType === "Spotlight Locator" && activeSpotlight) {
                const dx = key.cX - activeSpotlight.cX;
                const dy = key.cY - activeSpotlight.cY;
                const distSq = dx * dx + dy * dy;

                // Max range is proportional to the keyboard layout size (correct scaling)
                const totalKeySpanX = (canvas.width / unitScaleX) * unitScaleX;
                const totalKeySpanY = (canvas.height / unitScaleY) * unitScaleY;

                const maxRange = Math.min(totalKeySpanX, totalKeySpanY) * 0.8 * normalizedScale;

                // Clamped distance: ensures distNormalized is 1.0 or less
                const distNormalized = Math.min(1.0, Math.sqrt(distSq) / maxRange);

                // Inverse falloff effect (1.0 close to key, 0.0 at maxRange)
                let intensity = Math.pow(1.0 - distNormalized, 4);

                // Apply the globally calculated time-based fade to the intensity
                intensity = intensity * fadeAlpha;

                // The light dies to zero when intensity is zero (keyAlpha = 0)
                keyColor = getColorFromPalette(activeSpotlight.fixedColorT);
                keyAlpha = intensity;

                drawEffectBackground = true;
            }
            else if (effectType === "Heatmap") {
                const hits = HIT_COUNTS[id] || 0;
                if (hits > 0) {
                    const intensity = Math.min(hits / maxHits, 1.0);
                    keyColor = getColorFromPalette(intensity);
                    keyAlpha = 0.4 + (intensity * 0.6);
                    drawEffectBackground = true; // Draw the heatmap layer
                } else {
                    keyColor = "#000000";
                    keyAlpha = 0;
                }
            } else if (effectType === "None") {
                // If None is selected, draw a dark background if not in debug mode.
                if (!drawDebug) {
                    keyColor = "#333333";
                    keyAlpha = 1.0;
                    drawEffectBackground = true;
                }
            }

            // 6c. Draw the calculated layer (Heatmap, or None background)
            if (drawEffectBackground) {
                drawRoundedRect(
                    key.x, // Use full calculated x, no offset
                    key.y, // Use full calculated y, no offset
                    key.w, // Use full calculated width
                    key.h, // Use full calculated height
                    radius, keyColor, keyAlpha
                );
            }
        }

        // 7. Effects
        for (let i = activeFlashes.length - 1; i >= 0; i--) {
            const fx = activeFlashes[i];
            const flashFactor = (colorMode === "Random Palette") ? fx.fixedColorT : cycleT;
            const col = getColorFromPalette(flashFactor);

            ctx.save();
            // Use time-based alpha for Spiral Flash, or fixed counter for others
            ctx.globalAlpha = Math.max(0, (fx.type === 'SpiralFlash' && typeof fx.alpha !== 'undefined') ? fx.alpha : fx.lifetime / 100);
            ctx.fillStyle = col;

            if (fx.type === 'SpiralFlash') {
                // --- SPIRAL FLASH: Orbits around key center ---

                // 1. Calculate the offset (distance) from the key center
                const offsetX = fx.distance * Math.cos(fx.orbitAngle);
                const offsetY = fx.distance * Math.sin(fx.orbitAngle);

                // 2. Translate to the final center position (Key Center + Offset)
                ctx.translate(fx.cX + offsetX, fx.cY + offsetY);

                // 3. Draw the fixed-orientation rectangle centered on the new origin (0,0)
                const rectW = fx.initialW;
                const rectH = fx.initialH;

                // Draw the key-sized rectangle relative to the translated origin
                ctx.fillRect(-rectW / 2, -rectH / 2, rectW, rectH);
            }
            else if (fx.type === 'ExplodeFlash') {
                // --- EXPLODE FLASH: Symmetrical growth from key center ---

                // Calculate the size difference
                const sizeDiffW = fx.w - fx.initialW;
                const sizeDiffH = fx.h - fx.initialH;

                // Calculate the drawing position (original top-left corner - offset)
                const drawX = fx.initialX - sizeDiffW / 2;
                const drawY = fx.initialY - sizeDiffH / 2;

                drawRoundedRect(
                    drawX, // Use full calculated x, no offset
                    drawY, // Use full calculated y, no offset
                    fx.w, // Use full calculated width
                    fx.h, // Use full calculated height
                    radius, col, fx.lifetime / 100
                );
            }
            else {
                // --- STANDARD FLASH / GRADIENT PULSE ---
                drawRoundedRect(
                    fx.x, // Use full calculated x, no offset
                    fx.y, // Use full calculated y, no offset
                    fx.w, // Use full calculated width
                    fx.h, // Use full calculated height
                    radius, col, fx.lifetime / 100
                );
            }

            ctx.restore(); // Restore context after custom rendering

            fx.update();
            if (fx.lifetime <= 0) activeFlashes.splice(i, 1);
        }

        // 8. Active Effect: Ripple
        if (effectType === "Ripples") {

            // --- CALCULATE DYNAMIC RIPPLE LINE WIDTH ---
            const thicknessFactor = (parseInt(vibrationAmount) || 10) / 100.0;
            const baseRippleWidth = unitScaleY * 0.5 * thicknessFactor;

            for (let i = activeRipples.length - 1; i >= 0; i--) {
                const rip = activeRipples[i];
                rip.update();

                const rippleFactor = (colorMode === "Random Palette") ? rip.fixedColorT : cycleT;
                const rippleColor = getColorFromPalette(rippleFactor);

                ctx.save();
                ctx.globalAlpha = Math.max(0, rip.alpha);

                // --- DIFFUSER / GLOW EFFECT ---
                ctx.shadowBlur = 15 * normalizedScale;
                ctx.shadowColor = rippleColor;

                ctx.beginPath();
                ctx.arc(rip.x, rip.y, rip.radius, 0, Math.PI * 2);

                // Draw the stroke/outline for all ripple types
                ctx.globalAlpha = Math.max(0, rip.alpha);
                ctx.strokeStyle = rippleColor;

                ctx.lineWidth = baseRippleWidth * 0.5;

                ctx.lineWidth = Math.max(1, ctx.lineWidth);

                ctx.stroke();

                ctx.restore();

                // --- REMOVAL LOGIC: DISTANCE BASED ---
                // Calculate distance to the furthest corner of the canvas from the ripple center
                const distX = Math.max(rip.x, canvas.width - rip.x);
                const distY = Math.max(rip.y, canvas.height - rip.y);
                const maxDist = Math.sqrt(distX * distX + distY * distY);

                // Remove only when the ring has completely passed the furthest corner
                // We add a buffer (100px) to account for line thickness and glow
                if (rip.radius > maxDist + 100) {
                    activeRipples.splice(i, 1);
                }
            }
        }

        // 9. Active Effects: Knight Rider Bar
        if (effectType === "Knight Rider Bar") {
            for (let i = activeKnightBars.length - 1; i >= 0; i--) {
                const bar = activeKnightBars[i];
                const barFactor = (colorMode === "Random Palette") ? bar.fixedColorT : cycleT;
                const col = getColorFromPalette(barFactor);

                ctx.save();
                ctx.globalAlpha = Math.max(0, bar.lifetime / 100);
                ctx.fillStyle = col;

                ctx.fillRect(bar.x, bar.y, bar.w, bar.h); // Use full calculated w/h
                ctx.restore();

                bar.update();
                if (bar.lifetime <= 0) activeKnightBars.splice(i, 1);
            }
        }

        // 10. Active Effects: Star Emitter
        if (effectType === "Star Emitter") {
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                const particle = activeParticles[i];
                const particleFactor = (colorMode === "Random Palette") ? particle.fixedColorT : cycleT;
                const col = getColorFromPalette(particleFactor);

                ctx.save();
                ctx.globalAlpha = Math.max(0, particle.alpha);
                ctx.fillStyle = col;

                ctx.beginPath();
                ctx.arc(particle.x, particle.y, particle.size * normalizedScale, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                particle.update();
                if (particle.lifetime <= 0) activeParticles.splice(i, 1);
            }
        }

        // 11. Active Effects: Row Column Flash
        if (effectType === "Row Column Flash") {
            const baseThickness = unitScaleY;
            const thicknessFactor = (parseInt(vibrationAmount) || 10) / 100.0;
            const lineThickness = baseThickness * thicknessFactor;

            for (let i = activeRowColumnFlashes.length - 1; i >= 0; i--) {
                const rcf = activeRowColumnFlashes[i];
                const rcfFactor = (colorMode === "Random Palette") ? rcf.fixedColorT : cycleT;
                const col = getColorFromPalette(rcfFactor);

                ctx.save();
                ctx.globalAlpha = Math.max(0, rcf.lifetime / 100);

                // --- Draw Horizontal Bar (Row) ---
                const hBarY = (rcf.uY - minUY) * unitScaleY + (unitScaleY / 2);
                ctx.fillStyle = col;
                ctx.fillRect(0, hBarY - lineThickness / 2, canvas.width, lineThickness);

                // --- Draw Vertical Bar (Column) ---
                const vBarX = (rcf.uX - minUX) * unitScaleX + (unitScaleX / 2);
                ctx.fillRect(vBarX - lineThickness / 2, 0, lineThickness, canvas.height);

                ctx.restore();

                rcf.update();
                if (rcf.lifetime <= 0) activeRowColumnFlashes.splice(i, 1);
            }
        }

        // 12. Active Effects: Lightning Strike
        if (effectType === "Lightning Strike") {
            for (let i = activeLightningStrikes.length - 1; i >= 0; i--) {
                const strike = activeLightningStrikes[i];
                const strikeFactor = (colorMode === "Random Palette") ? strike.fixedColorT : cycleT;
                const col = getColorFromPalette(strikeFactor);

                ctx.save();
                ctx.globalAlpha = Math.max(0, strike.alpha * 0.9);
                ctx.strokeStyle = col;

                // Thickness of the line is now proportional to the base key size (unitScaleX)
                ctx.lineWidth = unitScaleX * normalizedScale;
                ctx.lineCap = 'round';

                // Draw the main line segment
                ctx.beginPath();
                ctx.moveTo(strike.targetKey.cX, strike.targetKey.cY);
                ctx.lineTo(strike.currentEnd.x, strike.currentEnd.y);
                ctx.stroke();

                ctx.restore();

                strike.update();
                if (strike.lifetime <= 0 && strike.jumpsRemaining <= 0) activeLightningStrikes.splice(i, 1);
            }
        }

        // Render Gravity Sparks
        if (effectType === "Gravity Sparks") {
            for (let i = activeSparks.length - 1; i >= 0; i--) {
                const spark = activeSparks[i]; spark.update();
                const col = getColorFromPalette((colorMode === "Random Palette") ? spark.fixedColorT : cycleT);
                ctx.save();
                ctx.globalAlpha = Math.max(0, spark.lifetime / 100);
                ctx.fillStyle = col;
                ctx.shadowBlur = 10; ctx.shadowColor = col;
                ctx.beginPath();
                ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                if (spark.lifetime <= 0) activeSparks.splice(i, 1);
            }
        }

        // Render Space-Time Punch
        if (effectType === "Space-Time Punch" && gravityWells.length > 0) {
            ctx.save();
            ctx.strokeStyle = getColorFromPalette(cycleT);
            ctx.lineWidth = 1.5 * normalizedScale;
            
            // --- NEW: Calculate smooth phase-out based on remaining lifetime ---
            let maxLife = 0;
            for (let w of gravityWells) {
                if (w.lifetime > maxLife) maxLife = w.lifetime;
            }
            ctx.globalAlpha = Math.max(0, (maxLife / 100) * 0.6); 
            // ------------------------------------------------------------------

            const gridSize = 15 * normalizedScale;
            ctx.beginPath();

            // Render Vertical lines warped by gravity
            for (let x = 0; x <= canvas.width; x += gridSize) {
                for (let y = 0; y <= canvas.height; y += 5) {
                    let drawX = x; let drawY = y;
                    for (let w of gravityWells) {
                        let dx = x - w.x; let dy = y - w.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < w.maxForce && dist > 0) {
                            let pull = (1 - (dist / w.maxForce)) * (w.lifetime / 100) * 20;
                            drawX -= (dx / dist) * pull;
                            drawY -= (dy / dist) * pull;
                        }
                    }
                    if (y === 0) ctx.moveTo(drawX, drawY);
                    else ctx.lineTo(drawX, drawY);
                }
            }
            // Render Horizontal lines warped by gravity
            for (let y = 0; y <= canvas.height; y += gridSize) {
                for (let x = 0; x <= canvas.width; x += 5) {
                    let drawX = x; let drawY = y;
                    for (let w of gravityWells) {
                        let dx = x - w.x; let dy = y - w.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < w.maxForce && dist > 0) {
                            let pull = (1 - (dist / w.maxForce)) * (w.lifetime / 100) * 20;
                            drawX -= (dx / dist) * pull;
                            drawY -= (dy / dist) * pull;
                        }
                    }
                    if (x === 0) ctx.moveTo(drawX, drawY);
                    else ctx.lineTo(drawX, drawY);
                }
            }
            ctx.stroke();
            ctx.restore();

            // Clean up wells
            for (let i = gravityWells.length - 1; i >= 0; i--) {
                gravityWells[i].update();
                if (gravityWells[i].lifetime <= 0) gravityWells.splice(i, 1);
            }
        }

        // --- RENDER ALGORITHMIC EFFECTS ---

        // Render Neural Tracers
        if (effectType === "Neural Tracers") {
            for (let i = activeTracers.length - 1; i >= 0; i--) {
                const tracer = activeTracers[i];
                tracer.update();
                const col = getColorFromPalette((colorMode === "Random Palette") ? tracer.fixedColorT : cycleT);

                ctx.save();
                ctx.globalAlpha = Math.max(0, tracer.lifetime / 100);
                ctx.strokeStyle = col;
                ctx.shadowBlur = 8;
                ctx.shadowColor = col;
                ctx.lineWidth = 3 * normalizedScale;
                ctx.lineJoin = 'miter'; // Keeps the 90-degree corners sharp

                ctx.beginPath();
                for (let j = 0; j < tracer.history.length; j++) {
                    let pt = tracer.history[j];
                    if (j === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();

                // Draw a bright glowing "head" on the tracer
                ctx.fillStyle = "#ffffff";
                ctx.beginPath();
                ctx.arc(tracer.x, tracer.y, 3 * normalizedScale, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                if (tracer.lifetime <= 0) activeTracers.splice(i, 1);
            }
        }

        // Render Quantum Constellation
        if (effectType === "Quantum Constellation" && quantumNodes.length > 0) {
            const baseThickness = unitScaleY;
            const maxConnectDistance = 150 * normalizedScale; // How far the web reaches
            const thicknessFactor = (parseInt(vibrationAmount) || 10) / 100.0;
            const lineThickness = baseThickness * thicknessFactor;

            ctx.save();
            ctx.lineCap = 'round';

            // Step 1: Draw connections between all nodes
            for (let i = 0; i < quantumNodes.length; i++) {
                let n1 = quantumNodes[i];
                n1.update();

                for (let j = i + 1; j < quantumNodes.length; j++) {
                    let n2 = quantumNodes[j];
                    let dx = n1.x - n2.x;
                    let dy = n1.y - n2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxConnectDistance) {
                        // Calculate web opacity based on distance AND node lifetime
                        let distRatio = 1 - (dist / maxConnectDistance);
                        let lifeRatio = Math.min(n1.lifetime, n2.lifetime) / 100;
                        let alpha = Math.max(0, distRatio * lifeRatio);

                        let col = getColorFromPalette((colorMode === "Random Palette") ? n1.fixedColorT : cycleT);

                        ctx.globalAlpha = alpha;
                        ctx.strokeStyle = col;
                        console.log(lineThickness)
                        ctx.lineWidth = lineThickness;

                        ctx.beginPath();
                        ctx.moveTo(n1.x, n1.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.stroke();
                    }
                }
            }

            // Step 2: Draw the nodes themselves
            for (let i = quantumNodes.length - 1; i >= 0; i--) {
                let n = quantumNodes[i];
                let col = getColorFromPalette((colorMode === "Random Palette") ? n.fixedColorT : cycleT);

                ctx.globalAlpha = Math.max(0, n.lifetime / 100);
                ctx.fillStyle = col;
                ctx.shadowBlur = 10;
                ctx.shadowColor = col;
                ctx.beginPath();
                ctx.arc(n.x, n.y, 4 * normalizedScale, 0, Math.PI * 2);
                ctx.fill();

                if (n.lifetime <= 0) quantumNodes.splice(i, 1);
            }
            ctx.restore();
        }

        if (effectType === "Bioluminescent Spores") {
            const theTime = performance.now();
            for (let i = activeSpores.length - 1; i >= 0; i--) {
                const spore = activeSpores[i]; 
                spore.update(theTime);
                const col = getColorFromPalette((colorMode === "Random Palette") ? spore.fixedColorT : cycleT);
                
                ctx.save();
                ctx.globalAlpha = Math.max(0, spore.lifetime / 100);
                ctx.fillStyle = col;
                
                // Soft glow based on line thickness slider
                const thicknessFactor = (parseInt(vibrationAmount) || 10) / 10.0;
                ctx.shadowBlur = 10 * thicknessFactor * normalizedScale; 
                ctx.shadowColor = col;
                
                ctx.beginPath();
                ctx.arc(spore.x, spore.y, spore.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                if (spore.lifetime <= 0) activeSpores.splice(i, 1);
            }
        }

        // 13. Debug Dots
        if (drawDebug) {
            for (let i = touchDots.length - 1; i >= 0; i--) {
                let dot = touchDots[i];
                ctx.fillStyle = dot.color;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 14. Display Last Key Pressed for Debugging
        if (drawDebug) {
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Last Key: ${lastKeyPressedName}`, 10, 20);
        }

        window.requestAnimationFrame(draw);
    }

    // Set initial dimensions and start fetch on first execution
    document.addEventListener('DOMContentLoaded', () => {
        // Dynamically size the canvas to match the parent window
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Rebuild coordinate grid if the window is resized
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (RAW_KEYS.length > 0) buildGridDictionary(RAW_KEYS);
        });

        // Initial fetch to load layout data immediately
        const initialUrl = (keyboardPreset === "Custom URL") ? customUrl : PRESETS[keyboardPreset];
        fetchAndParse(initialUrl);

        window.requestAnimationFrame(draw);
    });

    // --- COMBINER COMPATIBILITY HOOKS ---
    // If running inside the Combiner's iframe, reach up and hook into the parent window
    if (window.parent && window.parent !== window) {

        // Expose QMK functions so SignalRGB's engine can trigger them directly on the parent
        // We wrap triggerKey so that if multiple QMK visualizers are combined, they don't overwrite each other
        const originalTriggerKey = window.parent.triggerKey;
        window.parent.triggerKey = function (key) {
            if (originalTriggerKey) originalTriggerKey(key);
            if (typeof window.triggerKey === 'function') window.triggerKey(key);
        };

        window.parent.mapKeyCode = window.mapKeyCode;
        window.parent.KEY_DB = window.KEY_DB;
    }
</script>
