<body>
    <canvas id="effect-canvas" width="320" height="200"></canvas>
    <script>
        const canvas = document.getElementById('effect-canvas');
        const ctx = canvas.getContext('2d');
        let decayFan = 0, decayRail = 0, decayAio1 = 0, decayAio2 = 0, decayRam1 = 0, decayRam2 = 0, decayStr = 0, decayMat = 0;
        let strimerDecays = new Array(20).fill(0);
        let timeC = 0, timeInnerC = 0, timeR = 0, timeA1 = 0, timeA2 = 0, timeRam1 = 0, timeRam2 = 0, timeS = 0, timeMat = 0;
        let trails = [], sparklesStore = {}, strimerSeeds = [];
        let lastJsonString = "";
        let cachedJson = [];
        let lastTime = 0;
        let engineTime = 0;
        let reducedFreq = []; // New global array for the filtered audio data

        const palettes = {
            "Amethyst": ["#9932cc", "#8a2be2", "#4b0082", "#ba55d3", "#e0b0ff"],
            "Bloodline": ["#4a0000", "#8b0000", "#ff0000", "#ff4d4d", "#330000"],
            "Breeze": ["#00d2ff", "#3a7bd5", "#00f2fe", "#4facfe", "#0072ff"],
            "Candy": ["#ff0080", "#ff8c00", "#ff00ff", "#ff0055", "#ffd700"],
            "Cyber": ["#00ff99", "#00ffff", "#bc00ff", "#ff00ff", "#33ff00", "#0099ff"],
            "Deep Sea": ["#001144", "#00008b", "#0000ff", "#1e90ff", "#00ffff", "#00ced1"],
            "Forest": ["#004400", "#228b22", "#00ff00", "#32cd32", "#adff2f", "#556b2f"],
            "Glacier": ["#0088ff", "#b0e0e6", "#ffffff", "#afeeee", "#add8e6", "#00bfff"],
            "Gold Rush": ["#b8860b", "#daa520", "#ffd700", "#fff8dc", "#ffdf00"],
            "Inferno": ["#4b0000", "#ff0000", "#ff4500", "#ffa500", "#ffff00", "#ff8c00"],
            "Matrix": ["#003b00", "#008f11", "#00ff41", "#00ff00", "#003300"],
            "Midnight": ["#0c0c0c", "#1a1a1a", "#2c3e50", "#4b0082", "#000033"],
            "Neon Stream": ["#00ffff", "#ff00ff", "#ffff00", "#00ff00", "#ff0000", "#0000ff"],
            "Prism": ["#ffffff", "#00ffff", "#ff00ff", "#0000ff", "#ccff00", "#ffffff"],
            "Rainbow": ["#ff0000", "#ffff00", "#00ff00", "#00ffff", "#0000ff", "#ff00ff"],
            "Sakura": ["#ffb7c5", "#ffc0cb", "#ff69b4", "#ff1493", "#db7093"],
            "Sunset": ["#330066", "#800040", "#cc0000", "#ff4000", "#ff8c00", "#ffcc00"],
            "Toxic Loop": ["#ccff00", "#39ff14", "#00fa9a", "#4b0082", "#ff00ff"],
            "Vapor": ["#ff71ce", "#01cdfe", "#05ffa1", "#b967ff", "#fffb96"],
            "Volt": ["#ffff00", "#ccff00", "#adff2f", "#ffffff", "#eee8aa"]
        };

        for (let key in palettes) {
            if (key === "Rainbow") continue; 
            let p = palettes[key];
            let mirrored = [...p];
            for (let i = p.length - 2; i >= 1; i--) {
                mirrored.push(p[i]);
            }
            palettes[key] = mirrored;
        }

        function initProps() {
            document.querySelectorAll('meta[property]').forEach(meta => {
                const prop = meta.getAttribute('property');
                const type = meta.getAttribute('type');
                const def = meta.getAttribute('default');
                if (prop && window[prop] === undefined) {
                    if (type === 'number') window[prop] = parseFloat(def);
                    else if (type === 'boolean') window[prop] = (def === 'true');
                    else window[prop] = def;
                }
            });
        }
        initProps();

        function getAudioValue(currentDecay) {
            if (window.audioGain === 0) return currentDecay * ((window.flashDecay || 83) / 100);
            let level = 0;
            if (reducedFreq && reducedFreq.length > 0) {
                let limit = Math.min(4, reducedFreq.length);
                for (let i = 0; i < limit; i++) {
                    level += Math.abs(reducedFreq[i]);
                }
                // Max absolute value of Int8 is 128. Dividing normalizes to a 0.0 - 1.0 ratio
                level = (level / limit) / 128; 
            }
            
            let rawHit = Math.pow(Math.min(1.0, level), 1.2) * (window.audioGain / 50) * 2.5;
            if (isNaN(rawHit)) rawHit = 0; 
            return Math.max(rawHit, currentDecay * ((window.flashDecay || 83) / 100));
        }

        function getObjColor(profileName, customColor, idx, total, decayVal) {
            if (window.audioReactive && decayVal > 0.5) return "#ffffff"; 
            
            let isMasterActive = (window.masterProfile !== "None");
            let activeP = isMasterActive ? window.masterProfile : profileName;

            if (activeP === "Custom" && !isMasterActive) {
                return customColor;
            }

            let colors = [];
            if (activeP === "Custom" && isMasterActive) {
                const m1 = window.masterColor;
                const m2 = window.masterColor2 || "#ff0000";
                const m3 = window.masterColor3 || "#00ff00";
                colors = [m1, m2, m3, m2];
            } else {
                colors = palettes[activeP] || palettes["Rainbow"];
            }

            let safeTotal = total || 1;
            let normalizedIdx = ((idx % safeTotal) + safeTotal) % safeTotal; 
            let t = normalizedIdx / safeTotal;

            if (activeP === "Rainbow") {
                return `hsl(${t * 360}, 100%, 50%)`;
            }

            const floatColorIdx = t * colors.length;
            const i1 = Math.floor(floatColorIdx) % colors.length;
            const i2 = (i1 + 1) % colors.length;
            const fraction = floatColorIdx - Math.floor(floatColorIdx);

            const hexToRgb = hex => {
                if (!hex) return [255,0,0];
                let match = hex.match(/\w\w/g);
                return match ? match.map(x => parseInt(x, 16)) : [255,0,0];
            };
            
            const c1 = hexToRgb(colors[i1]);
            const c2 = hexToRgb(colors[i2]);

            const r = Math.round(c1[0] + fraction * (c2[0] - c1[0]));
            const g = Math.round(c1[1] + fraction * (c2[1] - c1[1]));
            const b = Math.round(c1[2] + fraction * (c2[2] - c1[2]));

            return `rgb(${r},${g},${b})`;
        }

        function getProgress(time, total, mode) {
            if (mode.includes("(Rev)")) return total - (time % total);
            if (mode === "Bounce") { const ph = (time % (total * 2)); return ph > total ? (total * 2) - ph : ph; }
            return time % total;
        }

        function handleSparkle(id, count, maxDots, isRev = false) {
            if (!sparklesStore[id]) sparklesStore[id] = [];
            const list = sparklesStore[id];
            if (list.length < maxDots && Math.random() < 0.15) {
                list.push({ pos: isRev ? 1.0 : 0.0, lineIdx: Math.floor(Math.random() * count) });
            }
            for (let i = list.length - 1; i >= 0; i--) {
                list[i].pos += isRev ? -0.012 : 0.012;
                if (list[i].pos > 1.0 || list[i].pos < 0.0) list.splice(i, 1);
            }
            return list;
        }

        function drawLabel(text, x, y) {
            if (!window.showLabels) return;
            ctx.globalAlpha = 1.0; ctx.fillStyle = "white"; ctx.font = "bold 8px Arial"; ctx.textAlign = "center";
            ctx.fillText(text, x, y);
        }

        function draw(currentTime) {
            if (!currentTime) currentTime = 0;
            let deltaTime = (currentTime - lastTime) / 1000 || (1 / 60);
            if (deltaTime > 0.25) deltaTime = 1 / 60; 
            lastTime = currentTime;

            engineTime += deltaTime * 1000;
            let frameMult = deltaTime * 60;

            // --- EXACT AUDIO EXTRACTION FROM EXAMPLE SCRIPT ---
            if (window.engine && engine.audio && engine.audio.freq) {
                var frequency = new Int8Array(engine.audio.freq);
                reducedFreq = frequency.filter((element, index) => {
                    return index % 4 === 0;
                });
            } else {
                reducedFreq = [];
            }

            try {
                const w = 320, h = 200, midX = w / 2, midY = h / 2;
                initProps();
                ctx.globalAlpha = 1.0; ctx.fillStyle = "black"; ctx.fillRect(0, 0, w, h);

                const count = window.fanCount || 11;
                const dotRad = (window.circleSize || 6) / 2, fanGap = dotRad * 2;
                const centerY = midY + window.vOffset;
                const baseFRad = window.fanRadius || 16;
                const rawW = (count * baseFRad * 2) + ((count - 1) * fanGap);
                const scale = rawW > 310 ? 310 / rawW : 1.0;
                const fRad = baseFRad * scale, scaledGap = fanGap * scale;
                const fanSpacing = fRad * 2 + scaledGap;
                const startX = (w - ((count * fRad * 2) + ((count - 1) * scaledGap))) / 2 + fRad;

                if (window.showGuides) {
                    ctx.strokeStyle = "white"; ctx.lineWidth = 1;
                    for (let i = 0; i < count; i++) {
                        const cx = startX + (i * fanSpacing);
                        
                        if (window.showCircle) {
                            ctx.beginPath(); ctx.arc(cx, centerY, fRad, 0, Math.PI * 2); ctx.stroke();
                        }
                        if (window.showInnerCircle) {
                            ctx.beginPath(); ctx.arc(cx, centerY, (window.innerFanRadius || 6) * scale, 0, Math.PI * 2); ctx.stroke();
                        }
                        if (window.showRails) {
                            ctx.beginPath(); ctx.moveTo(cx - fRad, centerY - window.railDistance * scale); ctx.lineTo(cx + fRad, centerY - window.railDistance * scale); ctx.stroke();
                            ctx.beginPath(); ctx.moveTo(cx - fRad, centerY + window.railDistance * scale); ctx.lineTo(cx + fRad, centerY + window.railDistance * scale); ctx.stroke();
                        }
                    }
                    if (window.showAIO1) { ctx.beginPath(); ctx.moveTo(window.aio1X, window.aio1Y); ctx.lineTo(window.aio1X + window.aio1Width, window.aio1Y); ctx.stroke(); }
                    if (window.showAIO2) { ctx.beginPath(); ctx.moveTo(window.aio2X, window.aio2Y); ctx.lineTo(window.aio2X + window.aio2Width, window.aio2Y); ctx.stroke(); }
                    if (window.showRam1) { ctx.beginPath(); ctx.moveTo(window.ram1X, window.ram1Y); ctx.lineTo(window.ram1X, window.ram1Y + window.ram1Height); ctx.stroke(); }
                    if (window.showRam2) { ctx.beginPath(); ctx.moveTo(window.ram2X, window.ram2Y); ctx.lineTo(window.ram2X, window.ram2Y + window.ram2Height); ctx.stroke(); }
                    if (window.showStrimer) {
                        const sl = window.strimerLines || 4;
                        for (let l = 0; l < sl; l++) {
                            const ly = window.strimerY + (l - (sl - 1) / 2) * 6;
                            ctx.beginPath(); ctx.moveTo(window.strimerX, ly); ctx.lineTo(window.strimerX + window.strimerWidth, ly); ctx.stroke();
                        }
                    }
                    if (window.showMatrix) {
                        const cell = Math.floor(window.matrixCellSize);
                        ctx.strokeRect(Math.floor(window.matrixX), Math.floor(window.matrixY), cell * window.matrixCols, cell * window.matrixRows);
                    }
                }

                if (window.showLabels) {
                    for (let i = 0; i < count; i++) drawLabel(`Fan ${i + 1}`, startX + (i * fanSpacing), centerY + fRad + 20);
                    if (window.showAIO1) drawLabel("AIO 1", window.aio1X + window.aio1Width / 2, window.aio1Y - 7);
                    if (window.showAIO2) drawLabel("AIO 2", window.aio2X + window.aio2Width / 2, window.aio2Y - 7);
                    if (window.showRam1) drawLabel("RAM 1", window.ram1X, window.ram1Y - 7);
                    if (window.showRam2) drawLabel("RAM 2", window.ram2X, window.ram2Y - 7);
                    if (window.showStrimer) drawLabel("Strimer", window.strimerX + window.strimerWidth / 2, window.strimerY - ((window.strimerLines || 4) * 3) - 7);
                    if (window.showMatrix) {
                        const cell = Math.floor(window.matrixCellSize);
                        drawLabel("Matrix", Math.floor(window.matrixX) + (window.matrixCols * cell) / 2, Math.floor(window.matrixY) - 7);
                    }
                }

                decayFan = getAudioValue(decayFan);
                decayRail = getAudioValue(decayRail);
                decayMat = getAudioValue(decayMat);

                const getLogBand = (bandIndex, totalBands, currentDecay) => {
                    if (window.audioGain === 0) return currentDecay * ((window.flashDecay || 83) / 100);
                    
                    let level = 0;
                    if (reducedFreq && reducedFreq.length > 0) {
                        const minBin = 1, maxBin = Math.max(2, reducedFreq.length);
                        const logMin = Math.log(minBin), logMax = Math.log(maxBin);
                        
                        const startLog = logMin + (bandIndex / totalBands) * (logMax - logMin);
                        const endLog = logMin + ((bandIndex + 1) / totalBands) * (logMax - logMin);
                        const startBin = Math.floor(Math.exp(startLog));
                        const endBin = Math.max(startBin + 1, Math.floor(Math.exp(endLog)));
                        const binsPerLine = endBin - startBin;
                        
                        for (let i = startBin; i < endBin && i < reducedFreq.length; i++) {
                            level += Math.abs(reducedFreq[i]);
                        }
                        level = (level / binsPerLine) / 128;
                        
                        const trebleBoost = 1.0 + (bandIndex / totalBands) * 1.5;
                        level = Math.min(1.0, level * trebleBoost);
                    }
                    
                    let rawHit = Math.pow(Math.min(1.0, level), 1.2) * (window.audioGain / 50) * 2.5;
                    if (isNaN(rawHit)) rawHit = 0;
                    return Math.max(rawHit, currentDecay * ((window.flashDecay || 83) / 100));
                };

                decayAio1 = getLogBand(0, 4, decayAio1); 
                decayAio2 = getLogBand(1, 4, decayAio2); 
                decayRam1 = getLogBand(2, 4, decayRam1); 
                decayRam2 = getLogBand(3, 4, decayRam2); 

                const sl = window.strimerLines || 4;

                for (let l = 0; l < sl; l++) {
                    if (window.audioGain === 0 || reducedFreq.length === 0) {
                        strimerDecays[l] = strimerDecays[l] * ((window.flashDecay || 83) / 100);
                        continue;
                    }

                    let level = 0;
                    const minBin = 1;
                    const maxBin = Math.max(2, reducedFreq.length);
                    const logMin = Math.log(minBin);
                    const logMax = Math.log(maxBin);

                    const startLog = logMin + (l / sl) * (logMax - logMin);
                    const endLog = logMin + ((l + 1) / sl) * (logMax - logMin);

                    const startBin = Math.floor(Math.exp(startLog));
                    const endBin = Math.max(startBin + 1, Math.floor(Math.exp(endLog)));
                    const binsPerLine = endBin - startBin;

                    for (let i = startBin; i < endBin && i < reducedFreq.length; i++) {
                        level += Math.abs(reducedFreq[i]);
                    }

                    level = (level / binsPerLine) / 128;

                    const trebleBoost = 1.0 + (l / sl) * 5;
                    level = Math.min(1.0, level * trebleBoost);

                    let rawHit = Math.pow(Math.min(1.0, level), 1.2) * (window.audioGain / 50) * 2.5;
                    if (isNaN(rawHit)) rawHit = 0;
                    strimerDecays[l] = Math.max(rawHit, strimerDecays[l] * ((window.flashDecay || 83) / 100));
                }

                timeC += ((window.circleSpeed || 41) / 1000) * frameMult;
                timeInnerC += ((window.innerCircleSpeed || 55) / 1000) * frameMult;
                timeR += ((window.railSpeed || 30) / 1000) * frameMult;
                timeA1 += ((window.aio1Speed || 10) / 1000) * frameMult;
                timeA2 += ((window.aio2Speed || 10) / 1000) * frameMult;
                timeRam1 += ((window.ram1Speed || 18) / 1000) * frameMult;
                timeRam2 += ((window.ram2Speed || 18) / 1000) * frameMult;
                timeS += ((window.strimerSpeed || 16) / 1000) * frameMult;
                timeMat += ((window.matrixSpeed || 20) / 1000) * frameMult;

                const renderCircleRing = (show, mode, dots, size, speed, trail, radiusBase, groupSize, prof, col, idPrefix, tC) => {
                    if (!show) return;
                    const rRad = radiusBase * scale;

                    if (mode === "Solid Line") {
                        for (let fIdx = 0; fIdx < count; fIdx++) {
                            const cx = startX + (fIdx * fanSpacing);
                            ctx.beginPath();
                            ctx.arc(cx, centerY, rRad, 0, Math.PI * 2);
                            ctx.lineWidth = Math.max(1, (size * scale) / 2);
                            
                            const activeProf = window.masterProfile !== "None" ? window.masterProfile : prof;
                            const activeCol = window.masterProfile !== "None" ? window.masterColor : col;

                            if (activeProf === "Custom" && window.masterProfile === "None") {
                                ctx.strokeStyle = activeCol;
                            } else {
                                try {
                                    const grad = ctx.createConicGradient((tC * 2) % (Math.PI * 2), cx, centerY);
                                    const stops = 30;
                                    for (let i = 0; i <= stops; i++) {
                                        grad.addColorStop(i / stops, getObjColor(prof, col, (i / stops) * count, count, decayFan));
                                    }
                                    ctx.strokeStyle = grad;
                                } catch(e) {
                                    ctx.strokeStyle = activeCol;
                                }
                            }
                            
                            ctx.globalAlpha = Math.min(1.0, Math.max(0.8, decayFan * 1.5));
                            ctx.stroke();
                        }
                        return;
                    }

                    if (mode.includes("Sparkle")) {
                        handleSparkle(idPrefix, count, (dots || 1) * count, mode.includes("(Rev)")).forEach(s => {
                            const cx = startX + (s.lineIdx * fanSpacing);
                            trails.push({ x: cx + Math.cos(s.pos * Math.PI * 2) * rRad, y: centerY + Math.sin(s.pos * Math.PI * 2) * rRad, size: size * scale, color: getObjColor(prof, col, s.lineIdx, count, decayFan), born: engineTime, len: trail });
                        });
                    } else {
                        let baseMode = mode;
                        if (mode.includes("Collide") || mode.includes("Split")) {
                            baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                        }
                        const prog = getProgress(tC, count, baseMode);
                        for (let d = 0; d < dots; d++) {
                            const dp = (prog + (d / dots) * count) % count;
                            let positions = [];

                            if (mode.includes("Collide")) {
                                positions.push(dp / 2);
                                positions.push(count - (dp / 2));
                            } else if (mode.includes("Split")) {
                                positions.push((count / 2) - (dp / 2));
                                positions.push((count / 2) + (dp / 2));
                            } else {
                                positions.push(dp);
                            }

                            positions.forEach(pos => {
                                for (let g = 0; g < groupSize; g++) {
                                    const fIdx = (Math.floor(pos) + g) % count;
                                    const cx = startX + (fIdx * fanSpacing);
                                    let dir = (mode === "Figure 8" && fIdx % 2 === 1) ? -1 : 1;
                                    if (mode === "Loop (Rev)") dir = -1;
                                    trails.push({ 
                                        x: cx + Math.cos((pos % 1) * Math.PI * 2 * dir - Math.PI / 2) * rRad, 
                                        y: centerY + Math.sin((pos % 1) * Math.PI * 2 * dir - Math.PI / 2) * rRad, 
                                        size: size * scale, 
                                        color: getObjColor(prof, col, fIdx, count, decayFan), 
                                        born: engineTime, 
                                        len: trail 
                                    });
                                }
                            });
                        }
                    }
                };

                renderCircleRing(window.showCircle, window.moveMode, window.circleDots, window.circleSize, window.circleSpeed, window.fanTrail, window.fanRadius, window.groupSize, window.fanProfile, window.fanColor, 'circle', timeC);
                renderCircleRing(window.showInnerCircle, window.innerMoveMode, window.innerCircleDots, window.innerCircleSize, window.innerCircleSpeed, window.innerFanTrail, window.innerFanRadius, window.innerGroupSize, window.innerFanProfile, window.innerFanColor, 'innerCircle', timeInnerC);

                if (window.showRails) {
                    const renderR = (rp) => {
                        const ry = centerY + rp * window.railDistance * scale;
                        const mode = window.railMode;

                        if (mode === "Solid Line") {
                            const totalRailW = ((count - 1) * fanSpacing) + (fRad * 2);
                            const startLx = startX - fRad;
                            ctx.beginPath();
                            ctx.moveTo(startLx, ry);
                            ctx.lineTo(startLx + totalRailW, ry);
                            ctx.lineWidth = Math.max(1, (window.railSize * scale) / 2);

                            const activeProf = window.masterProfile !== "None" ? window.masterProfile : window.railProfile;
                            const activeCol = window.masterProfile !== "None" ? window.masterColor : window.railColor;

                            if (activeProf === "Custom" && window.masterProfile === "None") {
                                ctx.strokeStyle = activeCol;
                            } else {
                                try {
                                    const grad = ctx.createLinearGradient(startLx, ry, startLx + totalRailW, ry);
                                    const stops = 30;
                                    for (let i = 0; i <= stops; i++) {
                                        let sampleIdx = ((i / stops) * count) - (timeR * 5);
                                        sampleIdx = (sampleIdx % 100000) + 100000;
                                        grad.addColorStop(i / stops, getObjColor(window.railProfile, window.railColor, sampleIdx, count, decayRail));
                                    }
                                    ctx.strokeStyle = grad;
                                } catch(e) {
                                    ctx.strokeStyle = activeCol;
                                }
                            }
                            
                            ctx.globalAlpha = Math.min(1.0, Math.max(0.8, decayRail * 1.5));
                            ctx.stroke();
                            return;
                        }

                        if (mode.includes("VU Meter")) {
                            const audioBoost = 2.0;
                            const level = Math.max(0.05, Math.min(1.0, decayRail * audioBoost));
                            const isRev = mode.includes("(Rev)");
                            
                            const railStartX = startX - fRad;
                            const railWidth = ((count - 1) * fanSpacing) + (fRad * 2);
                            
                            const dotsToDraw = Math.max(1, Math.floor(railWidth / 4));
                            const activeDots = Math.floor(dotsToDraw * level);
                            
                            for (let d = 0; d < activeDots; d++) {
                                const index = isRev ? (dotsToDraw - 1 - d) : d;
                                const dp = index / dotsToDraw;
                                const rx = railStartX + dp * railWidth;
                                trails.push({ x: rx, y: ry, size: window.railSize * scale, color: getObjColor(window.railProfile, window.railColor, d, dotsToDraw, 0), born: engineTime, len: 1 });
                            }
                            return;
                        }

                        if (mode.includes("Sparkle")) {
                            handleSparkle('rail' + rp, count, window.railDots * count, mode.includes("(Rev)")).forEach(s => {
                                const cx = startX + (s.lineIdx * fanSpacing);
                                trails.push({ x: cx - fRad + s.pos * fRad * 2, y: ry, size: window.railSize * scale, color: getObjColor(window.railProfile, window.railColor, s.lineIdx, count, decayRail), born: engineTime, len: window.railTrail });
                            });
                        } else {
                            let baseMode = mode;
                            if (mode.includes("Collide") || mode.includes("Split")) {
                                baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                            }
                            const p = getProgress(timeR, count, baseMode);

                            for (let d = 0; d < window.railDots; d++) {
                                const dp = (p + (d / window.railDots) * count) % count;
                                let positions = [];

                                if (mode.includes("Collide")) {
                                    positions.push(dp / 2);
                                    positions.push(count - (dp / 2));
                                } else if (mode.includes("Split")) {
                                    positions.push((count / 2) - (dp / 2));
                                    positions.push((count / 2) + (dp / 2));
                                } else {
                                    positions.push(dp);
                                }

                                positions.forEach((val) => {
                                    if (val < 0) return;
                                    let fIdx = Math.floor(val);
                                    let remainder = val % 1;
                                    if (val >= count) {
                                        fIdx = count - 1;
                                        remainder = 1.0;
                                    }
                                    const cx = startX + (fIdx * fanSpacing);
                                    trails.push({ x: cx - fRad + remainder * fRad * 2, y: ry, size: window.railSize * scale, color: getObjColor(window.railProfile, window.railColor, fIdx, count, decayRail), born: engineTime, len: window.railTrail });
                                });
                            }
                        }
                    };
                    renderR(-1); renderR(1);
                }

                if (window.showMatrix) {
                    const c = window.matrixCols || 16, r = window.matrixRows || 16;
                    const cell = Math.floor(window.matrixCellSize || 5);
                    const mx = Math.floor(window.matrixX), my = Math.floor(window.matrixY);
                    let pts = [];

                    if (window.matrixMode === "JSON Image") {
                        if (window.matrixJSON !== lastJsonString) {
                            try {
                                cachedJson = JSON.parse(window.matrixJSON);
                                lastJsonString = window.matrixJSON;
                            } catch (e) {
                                cachedJson = [];
                            }
                        }
                        for (let y = 0; y < cachedJson.length && y < r; y++) {
                            for (let x = 0; x < cachedJson[y].length && x < c; x++) {
                                let val = cachedJson[y][x];

                                if (val === 0) {
                                    pts.push({ x: x, y: y, explicitColor: "#000000", opacity: 1.0 });
                                } else if (val === 1) {
                                    pts.push({ x: x, y: y, explicitColor: "#ffffff", opacity: 1.0 });
                                } else if (val === 0.5) {
                                    pts.push({ x: x, y: y, cIdx: 0, opacity: 0.5 });
                                }
                            }
                        }
                    } else if (window.matrixMode === "Snake") {
                        const t = Math.floor(timeMat * 15);
                        for (let i = 0; i < 6; i++) {
                            const idx = (t - i) % (c * r);
                            pts.push({ x: idx % c, y: Math.floor(idx / c) });
                        }
                    } else if (window.matrixMode === "Random") {
                        for (let i = 0; i < 3; i++) pts.push({ x: Math.floor(Math.random() * c), y: Math.floor(Math.random() * r) });
                    } else {
                        const is12h = (window.matrixTimeFormat || "12-Hour") === "12-Hour";
                        let txt = (window.matrixMode === "Time") ? new Date().toLocaleTimeString([], { hour12: is12h, hour: 'numeric', minute: '2-digit' }) :
                            (window.matrixMode === "Date") ? new Date().toLocaleDateString([], { month: 'short', day: 'numeric' }) : window.matrixText;

                        const res = 10;
                        const offC = document.createElement('canvas');
                        offC.width = c * res;
                        offC.height = r * res;
                        const ox = offC.getContext('2d', { willReadFrequently: true });

                        ox.imageSmoothingEnabled = false;
                        const fontFam = window.matrixFont || "Courier New";
                        const fontScale = (window.matrixFontSize || 75) / 100;

                        ox.font = `${Math.floor(r * res * fontScale)}px '${fontFam}', monospace`;
                        ox.textBaseline = "middle";
                        ox.fillStyle = "white";

                        const tw = ox.measureText(txt).width;
                        const textCells = Math.ceil(tw / res);
                        const scrollStep = Math.floor(timeMat * 15);
                        const offsetCells = scrollStep % (textCells + c);
                        const sx = (c - offsetCells) * res;

                        ox.fillText(txt, sx, (r * res) / 2 + (res * 0.05));
                        const data = ox.getImageData(0, 0, c * res, r * res).data;

                        for (let y = 0; y < r; y++) {
                            for (let x = 0; x < c; x++) {
                                let alphaSum = 0;
                                for (let dy = 2; dy <= 8; dy += 3) {
                                    for (let dx = 2; dx <= 8; dx += 3) {
                                        alphaSum += data[((y * res + dy) * c * res + (x * res + dx)) * 4 + 3];
                                    }
                                }
                                if (alphaSum > 255 * 2.0) pts.push({ x, y });
                            }
                        }
                    }

                    pts.forEach(p => {
                        const cIndex = p.cIdx !== undefined ? p.cIdx : p.y;
                        const flowSpeed = 2; 
                        const animatedIndex = cIndex - (timeMat * flowSpeed) + 1000000;
                        const finalColor = p.explicitColor ? p.explicitColor : getObjColor(window.matrixProfile, window.matrixColor, animatedIndex, r, decayMat);

                        trails.push({
                            x: mx + p.x * cell, y: my + p.y * cell,
                            size: cell, h: cell,
                            color: finalColor,
                            baseOpacity: p.opacity !== undefined ? p.opacity : 1.0,
                            born: engineTime, len: window.matrixTrail, isRect: true
                        });
                    });
                }

                const renderAbs = (id, type, show, x, y, len, dCnt, tVal, mode, prof, col, dV, tL, defaultSize) => {
                    if (!show) return;

                    if (mode === "Solid Line") {
                        ctx.beginPath();
                        if (type === 'h') {
                            ctx.moveTo(x, y);
                            ctx.lineTo(x + len, y);
                        } else {
                            ctx.moveTo(x, y);
                            ctx.lineTo(x, y + len);
                        }
                        ctx.lineWidth = Math.max(1, defaultSize / 2);

                        const activeProf = window.masterProfile !== "None" ? window.masterProfile : prof;
                        const activeCol = window.masterProfile !== "None" ? window.masterColor : col;

                        if (activeProf === "Custom" && window.masterProfile === "None") {
                            ctx.strokeStyle = activeCol;
                        } else {
                            try {
                                const grad = type === 'h' ? ctx.createLinearGradient(x, y, x + len, y) : ctx.createLinearGradient(x, y, x, y + len);
                                const stops = 30;
                                const dotApprox = dCnt || 10;
                                for (let i = 0; i <= stops; i++) {
                                    let sampleIdx = ((i / stops) * dotApprox) - (tVal * 5);
                                    sampleIdx = (sampleIdx % 100000) + 100000;
                                    grad.addColorStop(i / stops, getObjColor(prof, col, sampleIdx, dotApprox, dV));
                                }
                                ctx.strokeStyle = grad;
                            } catch (e) {
                                ctx.strokeStyle = activeCol;
                            }
                        }
                        
                        ctx.globalAlpha = Math.min(1.0, Math.max(0.8, dV * 1.5));
                        ctx.stroke();
                        return;
                    }

                    if (mode.includes("VU Meter")) {
                        const audioBoost = 2.0;
                        const level = Math.max(0.05, Math.min(1.0, dV * audioBoost)); 
                        const isRev = mode.includes("(Rev)");
                        
                        const dotsToDraw = Math.max(1, Math.floor(len / 4));
                        const activeDots = Math.floor(dotsToDraw * level);
                        
                        for (let d = 0; d < activeDots; d++) {
                            const index = isRev ? (dotsToDraw - 1 - d) : d;
                            const dp = index / dotsToDraw;
                            
                            const rx = (type === 'h') ? x + dp * len : x;
                            const ry = (type === 'h') ? y : y + dp * len;
                            
                            trails.push({ x: rx, y: ry, size: 6, color: getObjColor(prof, col, d, dotsToDraw, 0), born: engineTime, len: 1 });
                        }
                        return;
                    }

                    if (mode.includes("Wipe")) {
                        const baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                        const p = getProgress(tVal, 1, baseMode);
                        const isRev = mode.includes("(Rev)");
                        const dotsToDraw = Math.max(1, Math.floor(len / 4));

                        for (let d = 0; d < dotsToDraw; d++) {
                            const dp = d / dotsToDraw;
                            const shouldDraw = isRev ? (dp > (1 - p)) : (dp < p);
                            if (shouldDraw) {
                                const rx = (type === 'h') ? x + dp * len : x;
                                const ry = (type === 'h') ? y : y + dp * len;
                                trails.push({ x: rx, y: ry, size: 6, color: getObjColor(prof, col, d, dotsToDraw, dV), born: engineTime, len: 1 });
                            }
                        }
                        return;
                    }

                    if (mode.includes("Meteor")) {
                        const mId = id + "_meteor";
                        if (!sparklesStore[mId]) sparklesStore[mId] = [];
                        const list = sparklesStore[mId];
                        const isRev = mode.includes("(Rev)");

                        if (list.length < dCnt && Math.random() < 0.1) {
                            list.push({ pos: isRev ? 1.0 : 0.0, speed: 0.005 + Math.random() * 0.015 });
                        }
                        for (let i = list.length - 1; i >= 0; i--) {
                            list[i].pos += isRev ? -list[i].speed : list[i].speed;
                            list[i].speed *= 1.05; 

                            const rx = (type === 'h') ? x + list[i].pos * len : x;
                            const ry = (type === 'h') ? y : y + list[i].pos * len;

                            if (list[i].pos > 1.0 || list[i].pos < 0.0) {
                                list.splice(i, 1);
                            } else {
                                trails.push({ x: rx, y: ry, size: 6, color: getObjColor(prof, col, 0, 1, dV), born: engineTime, len: tL });
                            }
                        }
                        return;
                    }

                    if (mode.includes("Sparkle")) {
                        handleSparkle(id, 1, dCnt, mode.includes("(Rev)")).forEach(s => {
                            const rx = (type === 'h') ? x + s.pos * len : x;
                            const ry = (type === 'h') ? y : y + s.pos * len;
                            trails.push({ x: rx, y: ry, size: 6, color: getObjColor(prof, col, 0, 1, dV), born: engineTime, len: tL });
                        });
                    } else {
                        let baseMode = mode;
                        if (mode.includes("Collide") || mode.includes("Split")) {
                            baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                        }
                        const p = getProgress(tVal, 1, baseMode);

                        for (let d = 0; d < dCnt; d++) {
                            const dp = (p + d / dCnt) % 1;
                            let positions = [];

                            if (mode.includes("Collide")) {
                                positions.push(dp / 2);
                                positions.push(1 - (dp / 2));
                            } else if (mode.includes("Split")) {
                                positions.push(0.5 - (dp / 2));
                                positions.push(0.5 + (dp / 2));
                            } else {
                                positions.push(dp);
                            }

                            positions.forEach((pos) => {
                                const rx = (type === 'h') ? x + pos * len : x;
                                const ry = (type === 'h') ? y : y + pos * len;
                                trails.push({ x: rx, y: ry, size: 6, color: getObjColor(prof, col, d, dCnt, dV), born: engineTime, len: tL });
                            });
                        }
                    }
                };

                renderAbs('aio1', 'h', window.showAIO1, window.aio1X, window.aio1Y, window.aio1Width, window.aio1Dots, timeA1, window.aio1Mode, window.aio1Profile, window.aio1Color, decayAio1, window.aio1Trail, 6);
                renderAbs('aio2', 'h', window.showAIO2, window.aio2X, window.aio2Y, window.aio2Width, window.aio2Dots, timeA2, window.aio2Mode, window.aio2Profile, window.aio2Color, decayAio2, window.aio2Trail, 6);
                renderAbs('ram1', 'v', window.showRam1, window.ram1X, window.ram1Y, window.ram1Height, window.ram1Dots, timeRam1, window.ram1Mode, window.ram1Profile, window.ram1Color, decayRam1, window.ram1Trail, 6);
                renderAbs('ram2', 'v', window.showRam2, window.ram2X, window.ram2Y, window.ram2Height, window.ram2Dots, timeRam2, window.ram2Mode, window.ram2Profile, window.ram2Color, decayRam2, window.ram2Trail, 6);

                if (window.showStrimer) {
                    const sl = window.strimerLines || 4, sd = window.strimerDots || 2, pc = (window.strimerPosVar || 0) / 100, sc = (window.strimerSpeedVar || 0) / 100;
                    if (strimerSeeds.length !== sl) strimerSeeds = Array.from({ length: sl }, () => ({ p: Math.random(), s: 0.5 + Math.random() }));

                    for (let l = 0; l < sl; l++) {
                        const ly = window.strimerY + (l - (sl - 1) / 2) * 6;
                        const lT = timeS * (1 + (strimerSeeds[l].s - 1) * sc), lP = strimerSeeds[l].p * pc;
                        const mode = window.strimerMode;
                        const activeDecay = strimerDecays[l];

                        if (mode === "Solid Line") {
                            ctx.beginPath();
                            ctx.moveTo(window.strimerX, ly);
                            ctx.lineTo(window.strimerX + window.strimerWidth, ly);
                            ctx.lineWidth = Math.max(1, 4 / 2);

                            const activeProf = window.masterProfile !== "None" ? window.masterProfile : window.strimerProfile;
                            const activeCol = window.masterProfile !== "None" ? window.masterColor : window.strimerColor;

                            if (activeProf === "Custom" && window.masterProfile === "None") {
                                ctx.strokeStyle = activeCol;
                            } else {
                                try {
                                    const grad = ctx.createLinearGradient(window.strimerX, ly, window.strimerX + window.strimerWidth, ly);
                                    const stops = 30;
                                    for (let i = 0; i <= stops; i++) {
                                        let sampleIdx = ((i / stops) * 10) - (lT * 15);
                                        sampleIdx = (sampleIdx % 100000) + 100000;
                                        grad.addColorStop(i / stops, getObjColor(window.strimerProfile, window.strimerColor, sampleIdx, 10, activeDecay));
                                    }
                                    ctx.strokeStyle = grad;
                                } catch(e) {
                                    ctx.strokeStyle = activeCol;
                                }
                            }
                            
                            ctx.globalAlpha = Math.min(1.0, Math.max(0.8, activeDecay * 1.5));
                            ctx.stroke();
                            continue;
                        }

                        if (mode.includes("VU Meter")) {
                            const audioBoost = 2.0;
                            const level = Math.max(0.05, Math.min(1.0, activeDecay * audioBoost));
                            const isRev = mode.includes("(Rev)");
                            
                            const dotsToDraw = Math.max(1, Math.floor(window.strimerWidth / 4));
                            const activeDots = Math.floor(dotsToDraw * level);
                            
                            for(let d = 0; d < activeDots; d++) {
                                const index = isRev ? (dotsToDraw - 1 - d) : d;
                                const dp = index / dotsToDraw;
                                trails.push({ x: window.strimerX + dp * window.strimerWidth, y: ly, size: 4, color: getObjColor(window.strimerProfile, window.strimerColor, l, sl, 0), born: engineTime, len: 1 });
                            }
                        }
                        else if (mode.includes("Wipe")) {
                            const baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                            const p = getProgress(lT + lP, 1, baseMode);
                            const isRev = mode.includes("(Rev)");
                            const dotsToDraw = Math.max(1, Math.floor(window.strimerWidth / 4));

                            for (let d = 0; d < dotsToDraw; d++) {
                                const dp = d / dotsToDraw;
                                const shouldDraw = isRev ? (dp > (1 - p)) : (dp < p);
                                if (shouldDraw) {
                                    trails.push({ x: window.strimerX + dp * window.strimerWidth, y: ly, size: 4, color: getObjColor(window.strimerProfile, window.strimerColor, l, sl, activeDecay), born: engineTime, len: 1 });
                                }
                            }
                        }
                        else if (mode.includes("Meteor")) {
                            const mId = "str_meteor_" + l;
                            if (!sparklesStore[mId]) sparklesStore[mId] = [];
                            const list = sparklesStore[mId];
                            const isRev = mode.includes("(Rev)");

                            if (list.length < sd && Math.random() < 0.1) {
                                list.push({ pos: isRev ? 1.0 : 0.0, speed: 0.005 + Math.random() * 0.015 });
                            }
                            for (let i = list.length - 1; i >= 0; i--) {
                                list[i].pos += isRev ? -list[i].speed : list[i].speed;
                                list[i].speed *= 1.05; 

                                if (list[i].pos > 1.0 || list[i].pos < 0.0) {
                                    list.splice(i, 1);
                                } else {
                                    trails.push({ x: window.strimerX + list[i].pos * window.strimerWidth, y: ly, size: 4, color: getObjColor(window.strimerProfile, window.strimerColor, l, sl, activeDecay), born: engineTime, len: window.strimerTrail });
                                }
                            }
                        }
                        else if (mode.includes("Sparkle")) {
                            handleSparkle("str" + l, 1, sd, mode.includes("(Rev)")).forEach(s => {
                                trails.push({ x: window.strimerX + s.pos * window.strimerWidth, y: ly, size: 4, color: getObjColor(window.strimerProfile, window.strimerColor, l, sl, activeDecay), born: engineTime, len: window.strimerTrail });
                            });
                        }
                        else {
                            let baseMode = mode;
                            if (mode.includes("Collide") || mode.includes("Split")) {
                                baseMode = mode.includes("Bounce") ? "Bounce" : "Loop";
                            }
                            const prog = getProgress(lT + lP, 1, baseMode);

                            for (let d = 0; d < sd; d++) {
                                const dp = (prog + d / sd) % 1;
                                let positions = [];

                                if (mode.includes("Collide")) {
                                    positions.push(dp / 2);
                                    positions.push(1 - (dp / 2));
                                } else if (mode.includes("Split")) {
                                    positions.push(0.5 - (dp / 2));
                                    positions.push(0.5 + (dp / 2));
                                } else {
                                    positions.push(dp);
                                }

                                positions.forEach((pos) => {
                                    trails.push({ x: window.strimerX + pos * window.strimerWidth, y: ly, size: 4, color: getObjColor(window.strimerProfile, window.strimerColor, l, sl, activeDecay), born: engineTime, len: window.strimerTrail });
                                });
                            }
                        }
                    }
                }

                const renderTime = engineTime;

                trails = trails.filter(t => (renderTime - t.born) < (Math.max(0.1, t.len) * 40));

                trails.forEach(t => {
                    const duration = Math.max(0.1, t.len) * 40;
                    const timeAlive = renderTime - t.born;

                    const age = timeAlive < 20 ? 0 : timeAlive / duration;

                    const currentAlpha = Math.max(0, (1 - age) * (t.baseOpacity !== undefined ? t.baseOpacity : 1));

                    if (t.isRect) {
                        ctx.globalAlpha = currentAlpha;
                        ctx.fillStyle = t.color;
                        ctx.fillRect(Math.floor(t.x), Math.floor(t.y), Math.floor(t.size), Math.floor(t.h));
                    } else {
                        ctx.globalAlpha = currentAlpha;
                        ctx.fillStyle = t.color;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, Math.max(0.001, (t.size * (0.4 + 0.6 * (1 - age))) / 2), 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            } catch (e) { 
                console.error("Render Loop Error:", e);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
